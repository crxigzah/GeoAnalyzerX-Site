<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camera Generation Game — 5kable</title>
<style>
  :root{
    --bg:#080810; --panel:#10101e; --panel2:#14142a; --border:#1e1e35;
    --text:#e8e8f5; --muted:#8888aa; --teal:#00c9a7; --purple:#7c3aed; --red:#ff6b6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    display:flex; flex-direction:column; align-items:center;
  }
  header{
    width:100%; padding:16px 24px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--border); box-sizing:border-box;
  }
  header a{ color:var(--muted); text-decoration:none; font-size:13px; }
  header a:hover{ color:var(--text); }
  .logo{ font-weight:800; color:var(--teal); font-size:16px; }
  .home-btn{
    display:flex; align-items:center; justify-content:center; width:36px; height:36px;
    border-radius:10px; background:var(--panel); border:1px solid var(--border); color:var(--muted);
    transition:color .15s, border-color .15s, background .15s;
  }
  .home-btn:hover{ color:var(--teal); border-color:var(--teal); background:rgba(0,201,167,0.08); }

  main{ width:100%; max-width:1100px; padding:32px 20px; display:flex; flex-direction:column; align-items:center; }
  h1{ font-size:26px; margin:0 0 4px; text-align:center; }
  .sub{ color:var(--muted); font-size:14px; margin-bottom:24px; text-align:center; max-width:520px; }

  .scoreboard{
    display:flex; gap:24px; margin-bottom:24px; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:14px 24px;
  }
  .score-item{ text-align:center; }
  .score-num{ font-size:20px; font-weight:800; color:var(--teal); }
  .score-label{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }

  .quiz-card{
    width:100%; background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:20px; box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .quiz-img-wrap{ width:100%; border-radius:12px; overflow:hidden; background:var(--panel2); min-height:560px; display:flex; align-items:center; justify-content:center; }
  .quiz-img-wrap img{ width:100%; display:block; }

  .options{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:18px; }
  @media (max-width:520px){ .options{ grid-template-columns:1fr; } }
  .opt-btn{
    background:var(--panel2); border:1px solid var(--border); color:var(--text);
    padding:14px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .opt-btn:hover:not(:disabled){ border-color:var(--teal); background:rgba(0,201,167,0.08); }
  .opt-btn:disabled{ cursor:default; }
  .opt-btn.correct{ background:rgba(0,201,167,0.18); border-color:var(--teal); color:var(--teal); }
  .opt-btn.wrong{ background:rgba(255,107,107,0.18); border-color:var(--red); color:var(--red); }

  .feedback{ margin-top:16px; text-align:center; font-size:14px; min-height:20px; }
  .next-btn{
    margin-top:14px; width:100%; padding:13px; background:linear-gradient(135deg,#00c9a7,#7c3aed);
    border:none; border-radius:10px; color:#080810; font-weight:800; font-size:14px; cursor:pointer; display:none;
  }
  .empty-state{ color:var(--muted); text-align:center; padding:60px 20px; }
  .loading{ color:var(--muted); text-align:center; padding:60px 20px; }
</style>
</head>

<main>
  <h1>🎥 Camera Generation Game</h1>
  <div class="sub">Look at the Street View capture and guess which Google camera generation shot it — a real, learnable GeoGuessr skill.</div>

  <div class="scoreboard">
    <div class="score-item"><div class="score-num" id="score-correct">0</div><div class="score-label">Correct</div></div>
    <div class="score-item"><div class="score-num" id="score-total">0</div><div class="score-label">Played</div></div>
    <div class="score-item"><div class="score-num" id="score-streak">0</div><div class="score-label">Streak</div></div>
    <div class="score-item"><div class="score-num" id="score-best">0</div><div class="score-label">Best Streak</div></div>
  </div>

  <div class="quiz-card">
    <div id="quiz-body">
      <div class="loading">Loading a scene...</div>
    </div>
  </div>
</main>

<script>
const API = 'https://geoanalyzerx.onrender.com';
let current = null;
let answered = false;

const stats = JSON.parse(localStorage.getItem('kbl_camera_quiz_stats') || '{"correct":0,"total":0,"streak":0,"best":0}');

function renderStats(){
  document.getElementById('score-correct').textContent = stats.correct;
  document.getElementById('score-total').textContent = stats.total;
  document.getElementById('score-streak').textContent = stats.streak;
  document.getElementById('score-best').textContent = stats.best;
}
function saveStats(){
  localStorage.setItem('kbl_camera_quiz_stats', JSON.stringify(stats));
}
renderStats();

async function loadNext(){
  answered = false;
  document.getElementById('quiz-body').innerHTML = '<div class="loading">Loading a scene...</div>';
  try {
    const res = await fetch(API + '/camera_quiz/random');
    if (res.status === 404){
      document.getElementById('quiz-body').innerHTML = '<div class="empty-state">No quiz images have been added yet — check back soon!</div>';
      return;
    }
    const data = await res.json();
    if (data.error){
      document.getElementById('quiz-body').innerHTML = `<div class="empty-state">${data.error}</div>`;
      return;
    }
    current = data;
    document.getElementById('quiz-body').innerHTML = `
      <div class="quiz-img-wrap"><img src="${data.image_url}"></div>
      <div class="options" id="options-wrap">
        ${data.options.map(opt => `<button class="opt-btn" data-gen="${opt}" onclick="submitAnswer('${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="loadNext()">Next Scene →</button>
    `;
  } catch(e) {
    document.getElementById('quiz-body').innerHTML = '<div class="empty-state">Could not load a scene right now — try refreshing.</div>';
  }
}

function submitAnswer(picked){
  if (answered || !current) return;
  answered = true;
  const isCorrect = picked === current.correct_gen;

  stats.total++;
  if (isCorrect){
    stats.correct++;
    stats.streak++;
    if (stats.streak > stats.best) stats.best = stats.streak;
  } else {
    stats.streak = 0;
  }
  saveStats();
  renderStats();

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.gen === current.correct_gen) btn.classList.add('correct');
    else if (btn.dataset.gen === picked) btn.classList.add('wrong');
  });

  document.getElementById('feedback').innerHTML = isCorrect
    ? `<span style="color:var(--teal);font-weight:700;">✓ Correct! This is ${current.correct_gen}.</span>`
    : `<span style="color:var(--red);font-weight:700;">✗ Not quite — this was ${current.correct_gen}.</span>`;
  document.getElementById('next-btn').style.display = 'block';
}

loadNext();
</script>
</body>
