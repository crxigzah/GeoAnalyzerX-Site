<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Speed Quiz — GeoAnalyzerX</title>
<style>
  :root{
    --bg:#080810; --panel:#10101e; --panel2:#14142a; --border:#1e1e35;
    --text:#e8e8f5; --muted:#8888aa; --teal:#00c9a7; --purple:#7c3aed; --red:#ff6b6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    display:flex; flex-direction:column; align-items:center;
  }
  header{
    width:100%; padding:16px 24px; display:flex; justify-content:space-between; align-items:center;
    border-bottom:1px solid var(--border); box-sizing:border-box;
  }
  header a{ color:var(--muted); text-decoration:none; font-size:13px; }
  header a:hover{ color:var(--text); }
  .logo{ font-weight:800; color:var(--teal); font-size:16px; }

  main{ width:100%; max-width:640px; padding:32px 20px; display:flex; flex-direction:column; align-items:center; }
  h1{ font-size:26px; margin:0 0 4px; text-align:center; }
  .sub{ color:var(--muted); font-size:14px; margin-bottom:24px; text-align:center; max-width:500px; }

  .scoreboard{
    display:flex; gap:24px; margin-bottom:24px; background:var(--panel); border:1px solid var(--border);
    border-radius:12px; padding:14px 24px;
  }
  .score-item{ text-align:center; }
  .score-num{ font-size:20px; font-weight:800; color:var(--teal); }
  .score-label{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }

  .quiz-card{
    width:100%; background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:24px; box-shadow:0 20px 50px rgba(0,0,0,0.35);
  }
  .timer-bar-wrap{ width:100%; height:6px; background:var(--panel2); border-radius:3px; overflow:hidden; margin-bottom:20px; }
  .timer-bar{ height:100%; background:linear-gradient(90deg,#00c9a7,#7c3aed); width:100%; transition:width .1s linear; }

  .clue-text{
    font-size:18px; font-weight:600; line-height:1.5; text-align:center; padding:20px;
    background:var(--panel2); border-radius:12px; margin-bottom:20px; min-height:80px;
    display:flex; align-items:center; justify-content:center;
  }

  .options{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:480px){ .options{ grid-template-columns:1fr; } }
  .opt-btn{
    background:var(--panel2); border:1px solid var(--border); color:var(--text);
    padding:14px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer;
    transition:background .15s, border-color .15s;
  }
  .opt-btn:hover:not(:disabled){ border-color:var(--teal); background:rgba(0,201,167,0.08); }
  .opt-btn:disabled{ cursor:default; }
  .opt-btn.correct{ background:rgba(0,201,167,0.18); border-color:var(--teal); color:var(--teal); }
  .opt-btn.wrong{ background:rgba(255,107,107,0.18); border-color:var(--red); color:var(--red); }

  .feedback{ margin-top:16px; text-align:center; font-size:14px; min-height:20px; }
  .next-btn{
    margin-top:14px; width:100%; padding:13px; background:linear-gradient(135deg,#00c9a7,#7c3aed);
    border:none; border-radius:10px; color:#080810; font-weight:800; font-size:14px; cursor:pointer; display:none;
  }
  .empty-state{ color:var(--muted); text-align:center; padding:60px 20px; }
  .loading{ color:var(--muted); text-align:center; padding:60px 20px; }
</style>
</head>
<body>

<header>
  <span class="logo">GeoAnalyzerX</span>
  <a href="/">← Back to GeoAnalyzerX</a>
</header>

<main>
  <h1>⚡ Meta Speed Quiz</h1>
  <div class="sub">A real fact pulled straight from an existing GeoAnalyzerX guide — 10 seconds to name the country it's describing.</div>

  <div class="scoreboard">
    <div class="score-item"><div class="score-num" id="score-correct">0</div><div class="score-label">Correct</div></div>
    <div class="score-item"><div class="score-num" id="score-total">0</div><div class="score-label">Played</div></div>
    <div class="score-item"><div class="score-num" id="score-streak">0</div><div class="score-label">Streak</div></div>
    <div class="score-item"><div class="score-num" id="score-best">0</div><div class="score-label">Best Streak</div></div>
  </div>

  <div class="quiz-card">
    <div id="quiz-body">
      <div class="loading">Loading a clue...</div>
    </div>
  </div>
</main>

<script>
const API = 'https://geoanalyzerx.onrender.com';
const TIME_LIMIT_MS = 10000;
let current = null;
let answered = false;
let timerInterval = null;

const stats = JSON.parse(localStorage.getItem('gax_meta_quiz_stats') || '{"correct":0,"total":0,"streak":0,"best":0}');

function renderStats(){
  document.getElementById('score-correct').textContent = stats.correct;
  document.getElementById('score-total').textContent = stats.total;
  document.getElementById('score-streak').textContent = stats.streak;
  document.getElementById('score-best').textContent = stats.best;
}
function saveStats(){ localStorage.setItem('gax_meta_quiz_stats', JSON.stringify(stats)); }
renderStats();

async function loadNext(){
  answered = false;
  clearInterval(timerInterval);
  document.getElementById('quiz-body').innerHTML = '<div class="loading">Loading a clue...</div>';
  try {
    const res = await fetch(API + '/meta_quiz/random');
    if (res.status === 404){
      document.getElementById('quiz-body').innerHTML = '<div class="empty-state">No guide facts available yet — check back once a few guides are written!</div>';
      return;
    }
    const data = await res.json();
    if (data.error){
      document.getElementById('quiz-body').innerHTML = `<div class="empty-state">${data.error}</div>`;
      return;
    }
    current = data;
    document.getElementById('quiz-body').innerHTML = `
      <div class="timer-bar-wrap"><div class="timer-bar" id="timer-bar"></div></div>
      <div class="clue-text">${data.clue_text}</div>
      <div class="options" id="options-wrap">
        ${data.options.map(opt => `<button class="opt-btn" data-country="${opt}" onclick="submitAnswer('${opt.replace(/'/g,"\\'")}')">${opt}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="loadNext()">Next Clue →</button>
    `;
    startTimer();
  } catch(e) {
    document.getElementById('quiz-body').innerHTML = '<div class="empty-state">Could not load a clue right now — try refreshing.</div>';
  }
}

function startTimer(){
  const startTime = Date.now();
  const bar = document.getElementById('timer-bar');
  timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;
    const pct = Math.max(0, 100 - (elapsed / TIME_LIMIT_MS) * 100);
    if (bar) bar.style.width = pct + '%';
    if (elapsed >= TIME_LIMIT_MS){
      clearInterval(timerInterval);
      if (!answered) submitAnswer(null); // time's up — counts as a miss
    }
  }, 50);
}

function submitAnswer(picked){
  if (answered || !current) return;
  answered = true;
  clearInterval(timerInterval);
  const isCorrect = picked === current.correct_country;

  stats.total++;
  if (isCorrect){
    stats.correct++;
    stats.streak++;
    if (stats.streak > stats.best) stats.best = stats.streak;
  } else {
    stats.streak = 0;
  }
  saveStats();
  renderStats();

  document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    if (btn.dataset.country === current.correct_country) btn.classList.add('correct');
    else if (btn.dataset.country === picked) btn.classList.add('wrong');
  });

  document.getElementById('feedback').innerHTML = isCorrect
    ? `<span style="color:var(--teal);font-weight:700;">✓ Correct! That's ${current.correct_country}.</span>`
    : picked === null
      ? `<span style="color:var(--red);font-weight:700;">⏱ Time's up — this was ${current.correct_country}.</span>`
      : `<span style="color:var(--red);font-weight:700;">✗ Not quite — this was ${current.correct_country}.</span>`;
  document.getElementById('next-btn').style.display = 'block';
}

loadNext();
</script>
</body>
</html>
