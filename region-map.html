<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Region Map — GeoAnalyzerX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --font-display: 'Segoe UI', Arial, sans-serif;
    --font-mono: 'IBM Plex Mono', monospace;
    --bg: #080810;
    --panel: #10101e;
    --panel-2: #14142a;
    --line: #1e1e35;
    --line-soft: #171728;
    --text: #e8e8f5;
    --muted: #6a6a9a;
    --muted-2: #454570;
    --covered: #00c9a7;
    --covered-hover: #1fe3c4;
    --covered-fill: rgba(0,201,167,0.82);
    --covered-fill-hover: rgba(31,227,196,0.95);
    --uncovered-fill: #14141f;
    --uncovered-stroke: #1e1e35;
    --amber: #7c3aed;
    --amber-fill: rgba(124,58,237,0.85);
    --danger: #ff4c6a;

    /* Map-canvas colors — kept separate from the UI-chrome variables above
       so a map color theme (e.g. "Google Maps style") can be swapped
       without touching the app's own header/sidebar/panel styling. */
    --map-glow: #0d131a;
    --map-sphere: #0c1219;
    --map-graticule: var(--line-soft);
    --map-land: var(--covered-fill);
    --map-land-hover: var(--covered-fill-hover);
    --map-land-stroke: #0d2b28;
    --map-land-nocode: var(--uncovered-fill);
    --map-land-nocode-stroke: var(--uncovered-stroke);
    --map-label-text: var(--text);
    --map-label-halo: #05070a;
    --map-ocean-1: #0d131a;
    --map-ocean-2: #0c1219;
    --map-bg-outer: var(--bg);
    --map-land-stroke-width: .6;
    --map-subdivision-stroke-width: .7;
    --map-label-halo-width: 3px;
    --map-label-size: 9px;
    --map-label-weight: 400;
  }

  /* "Google Maps style" theme — overrides only the map-canvas variables
     above, leaving the dark app UI (header, sidebar, legend) untouched. */
  body.labels-hidden .label-layer{ display:none; }

  body.google-theme{
    --map-glow: #aad3df;
    --map-sphere: #aad3df;
    --map-graticule: transparent;
    --map-land: #c0392b;
    --map-land-hover: #a93226;
    --map-land-stroke: #9fb89a;
    --map-land-nocode: #e3e2dc;
    --map-land-nocode-stroke: #c2c0b9;
    --map-label-text: #3c4043;
    --map-label-halo: #ffffff;
    --map-ocean-1: #bfe1ef;
    --map-ocean-2: #9fcbe0;
    --map-bg-outer: #9fcbe0;
    --map-land-stroke-width: .4;
    --map-subdivision-stroke-width: .5;
    --map-label-halo-width: 2px;
    --map-label-size: 14px;
    --map-label-weight: 700;
  }

  .ocean-stop-1{ stop-color: var(--map-ocean-1); }
  .ocean-stop-2{ stop-color: var(--map-ocean-2); }

  *{box-sizing:border-box;}
  html,body{
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    overflow:hidden;
  }
  .app{
    display:grid;
    grid-template-rows: auto 1fr;
    height:100vh;
  }

  /* ---------- header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:14px 22px;
    background: linear-gradient(180deg, var(--panel), var(--panel) 90%, transparent);
    border-bottom:1px solid var(--line);
    z-index:5;
  }
  .brand{
    display:flex;
    align-items:baseline;
    gap:10px;
    font-family: var(--font-display);
  }
  .brand .mark{
    color: var(--covered-hover);
    font-size:11px;
    letter-spacing:.18em;
    font-family: var(--font-mono);
    border:1px solid var(--covered);
    padding:2px 6px;
    border-radius:3px;
  }
  .brand h1{
    font-size:18px;
    font-weight:600;
    margin:0;
    letter-spacing:.01em;
  }
  .brand .sub{
    color: var(--muted);
    font-size:12px;
    letter-spacing:.02em;
  }
  .hdr-right{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .count-badge{
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    line-height:1.1;
  }
  .count-badge .n{
    font-family: var(--font-display);
    font-size:20px;
    font-weight:700;
    color: var(--covered-hover);
  }
  .count-badge .l{
    font-size:10px;
    letter-spacing:.14em;
    color: var(--muted);
  }
  .search-wrap{
    position:relative;
  }
  .search-wrap input{
    background: var(--panel-2);
    border:1px solid var(--line);
    color: var(--text);
    font-family: var(--font-mono);
    font-size:12px;
    padding:8px 12px 8px 30px;
    border-radius:5px;
    width:190px;
    outline:none;
    transition:border-color .15s;
  }
  .search-wrap input:focus{ border-color: var(--covered); }
  .search-wrap svg{
    position:absolute; left:9px; top:50%; transform:translateY(-50%);
    width:13px; height:13px; stroke:var(--muted);
  }
  .btn{
    background: var(--panel-2);
    border:1px solid var(--line);
    color: var(--muted);
    font-family: var(--font-mono);
    font-size:11px;
    letter-spacing:.06em;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
    transition: all .15s;
  }
  .btn:hover{ border-color: var(--covered); color: var(--text); }

  /* ---------- main layout ---------- */
  main{
    position:relative;
    display:grid;
    grid-template-columns: 1fr 280px;
    min-height:0;
  }
  .map-stage{
    position:relative;
    background:
      radial-gradient(ellipse at 50% 40%, var(--map-glow) 0%, var(--map-bg-outer) 70%);
    overflow:hidden;
  }
  .map-stage svg{ width:100%; height:100%; display:block; }
  .map-stage canvas{ width:100%; height:100%; display:block; cursor:grab; }
  .map-stage canvas.dragging{ cursor:grabbing; }

  .graticule{ stroke: var(--map-graticule); stroke-width:.5; fill:none; }
  .sphere{ fill: url(#oceanGrad); stroke: var(--line); stroke-width:1; }

  .country{
    stroke: var(--map-land-nocode-stroke);
    stroke-width: .6;
    fill: var(--map-land-nocode);
    transition: fill .12s ease;
  }
  .country.covered{
    fill: var(--map-land);
    stroke: var(--map-land-stroke);
    stroke-width: var(--map-land-stroke-width);
    cursor:pointer;
  }
  .country.covered:hover{
    fill: var(--map-land-hover);
  }
  .country.selected{
    fill: var(--amber-fill) !important;
    stroke: #3a2a0d;
  }

  .label-layer text{
    font-family: var(--font-mono);
    font-size: var(--map-label-size);
    font-weight: var(--map-label-weight);
    fill: var(--map-label-text);
    paint-order: stroke;
    stroke: var(--map-label-halo);
    stroke-width: var(--map-label-halo-width);
    stroke-linejoin: round;
    pointer-events:none;
  }
  .label-layer circle{ fill: var(--amber); }

  /* zoom controls */
  .annotate-toolbar{
    position:absolute; left:16px; top:16px;
    display:flex; gap:6px; align-items:center;
    background: rgba(16,22,29,0.85);
    border:1px solid var(--line);
    padding:6px;
    border-radius:8px;
    z-index:5;
    backdrop-filter: blur(4px);
  }
  .annotate-btn{
    width:32px; height:32px;
    background: var(--panel-2);
    border:1px solid var(--line);
    color: var(--text);
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
    display:flex; align-items:center; justify-content:center;
  }
  .annotate-btn:hover{ border-color: var(--covered); }
  .annotate-btn.active{ border-color: var(--covered); background: rgba(0,201,167,0.15); }
  #annotateColor{
    width:32px; height:32px;
    border:1px solid var(--line);
    border-radius:6px;
    padding:2px;
    background:none;
    cursor:pointer;
  }
  #annotateThickness{
    width:70px;
    accent-color: var(--covered);
    cursor:pointer;
  }

  .zoom-controls{
    position:absolute; right:16px; bottom:16px;
    display:flex; flex-direction:column; gap:6px;
    z-index:4;
  }
  .zoom-controls button{
    width:32px; height:32px;
    background: var(--panel-2);
    border:1px solid var(--line);
    color: var(--text);
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
  }
  .zoom-controls button:hover{ border-color: var(--covered); }

  /* legend */
  .legend{
    position:absolute; left:16px; bottom:16px;
    display:flex; gap:14px;
    background: rgba(16,22,29,0.85);
    border:1px solid var(--line);
    padding:8px 12px;
    border-radius:6px;
    font-size:10px;
    letter-spacing:.04em;
    color: var(--muted);
    backdrop-filter: blur(4px);
  }
  .legend .item{ display:flex; align-items:center; gap:6px; }
  .legend .sw{ width:10px; height:10px; border-radius:2px; }

  /* coordinate HUD */
  .hud{
    position:absolute; left:16px; top:16px;
    font-size:10px; color: var(--muted-2);
    letter-spacing:.05em;
    pointer-events:none;
  }

  /* breadcrumb / back-to-world control */
  .breadcrumb{
    position:absolute; left:16px; top:16px;
    display:flex; align-items:center; gap:10px;
    z-index:4;
  }
  .breadcrumb span{
    font-size:11px; color: var(--muted); letter-spacing:.06em;
  }
  .breadcrumb span b{ color: var(--covered-hover); }

  .loading-overlay{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(8,8,16,0.55);
    z-index:8;
  }
  .loading-text{
    background: var(--panel-2);
    border:1px solid var(--line);
    padding:10px 18px;
    border-radius:6px;
    font-size:12px;
    letter-spacing:.06em;
    color: var(--text);
  }

  .subdivision{
    stroke: var(--map-land-stroke);
    stroke-width: var(--map-subdivision-stroke-width);
    fill: var(--map-land);
  }

  /* ---------- side panel ---------- */
  aside{
    background: var(--panel);
    border-left:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .panel-toggle-btn{
    display:none;
    position:absolute;
    right:16px;
    top:16px;
    z-index:6;
    background: var(--panel-2);
    border:1px solid var(--line);
    color: var(--text);
    font-family: var(--font-mono);
    font-size:11px;
    letter-spacing:.06em;
    padding:8px 12px;
    border-radius:6px;
    cursor:pointer;
    align-items:center;
    gap:6px;
  }
  .panel-toggle-btn .badge{
    background: var(--amber);
    color:#0a0a14;
    font-weight:700;
    border-radius:10px;
    padding:1px 6px;
    font-size:10px;
  }
  .panel-section{
    padding:16px 16px 14px;
    border-bottom:1px solid var(--line);
  }
  .panel-section h2{
    font-family: var(--font-display);
    font-size:11px;
    letter-spacing:.14em;
    color: var(--muted);
    margin:0 0 10px;
    text-transform:uppercase;
  }
  .selected-empty{
    color: var(--muted-2);
    font-size:12px;
    line-height:1.5;
  }
  .selected-item{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background: var(--panel-2);
    border:1px solid var(--line);
    border-radius:5px;
    padding:8px 10px;
    margin-bottom:6px;
    font-size:12px;
  }
  .selected-item button{
    background:none; border:none; color: var(--muted); cursor:pointer; font-size:13px;
    line-height:1;
  }
  .selected-item button:hover{ color: var(--danger); }

  .region-list{
    flex:1;
    overflow-y:auto;
    padding:6px 10px 16px;
  }
  .region-list::-webkit-scrollbar{ width:6px; }
  .region-list::-webkit-scrollbar-thumb{ background: var(--line); border-radius:3px; }

  .region-toggle-item{
    display:flex;
    flex-direction:column;
    gap:6px;
    padding:8px;
    border-radius:6px;
    font-size:12px;
    color: var(--text);
  }
  .region-toggle-item:hover{ background: var(--panel-2); }
  .region-toggle-name{ font-weight:600; }
  .region-swatch-row{ display:flex; gap:5px; flex-wrap:wrap; }
  .region-swatch{
    width:18px; height:18px;
    border-radius:50%;
    border:2px solid transparent;
    cursor:pointer;
    padding:0;
    display:flex; align-items:center; justify-content:center;
    font-size:9px; color:#fff; font-weight:700;
    flex-shrink:0;
    transition: transform .1s, border-color .1s;
  }
  .region-swatch:hover{ transform: scale(1.15); }
  .region-swatch.active{ border-color:#fff; box-shadow:0 0 0 1px rgba(0,0,0,0.4); }
  .region-swatch-custom{
    border:2px solid rgba(255,255,255,0.5);
    -webkit-appearance:none; appearance:none;
    overflow:hidden;
    background: conic-gradient(red, yellow, lime, cyan, blue, magenta, red);
  }
  .region-swatch-custom::-webkit-color-swatch-wrapper{ padding:0; }
  .region-swatch-custom::-webkit-color-swatch{ border:none; border-radius:50%; }
  .region-swatch-custom::-moz-color-swatch{ border:none; border-radius:50%; }

  .subdivision.dimmed{
    fill: var(--map-land-nocode);
    stroke: var(--map-land-nocode-stroke);
  }

  .region-chip{
    display:flex;
    align-items:center;
    gap:8px;
    padding:7px 8px;
    border-radius:4px;
    font-size:12px;
    color: var(--text);
    cursor:pointer;
    transition: background .12s;
  }
  .region-chip:hover{ background: var(--panel-2); }
  .region-chip .dot{
    width:6px; height:6px; border-radius:50%;
    background: var(--covered);
    flex-shrink:0;
  }
  .region-chip.active .dot{ background: var(--amber); }
  .region-chip.active{ color: var(--amber); }
  .region-chip.hidden{ display:none; }

  /* ---------- footer ---------- */
  footer{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:8px 22px;
    background: var(--panel);
    border-top:1px solid var(--line);
    font-size:10px;
    color: var(--muted-2);
    letter-spacing:.04em;
  }
  footer a{ color: var(--muted); text-decoration:none; }
  footer a:hover{ color: var(--covered-hover); }

  @media (max-width: 820px){
    main{ grid-template-columns: 1fr; }
    aside{
      position:fixed;
      right:0; top:0; bottom:0;
      width:280px;
      max-width:85vw;
      transform: translateX(100%);
      transition: transform .25s ease;
      z-index:20;
      box-shadow: -12px 0 32px rgba(0,0,0,.5);
    }
    aside.open{ transform: translateX(0); }
    .panel-toggle-btn{ display:flex; }
    .brand .sub{ display:none; }
  }
</style>
</head>
<body>
<div class="scrim" id="scrim" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15;"></div>
<div class="app">
  <button class="panel-toggle-btn" id="panelToggle">
    Countries
  </button>

  <header>
    <div class="brand">
      <a href="/" class="mark" title="Back to GeoAnalyzerX" style="display:inline-flex;align-items:center;justify-content:center;text-decoration:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></svg>
      </a>
      <h1>Region Map</h1>
      <span class="sub">GeoGuessr world coverage reference</span>
    </div>
    <div class="hdr-right">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="searchInput" type="text" placeholder="Find a country…" autocomplete="off">
      </div>
      <button class="btn" id="mapStyleBtn">🗺️ MAP STYLE</button>
      <button class="btn" id="labelsBtn">🏷️ HIDE LABELS</button>
      <button class="btn" id="resetBtn">RESET VIEW</button>
      <div class="count-badge">
        <span class="n" id="countBadge">114</span>
        <span class="l">COVERED REGIONS</span>
      </div>
    </div>
  </header>

  <main>
    <div class="map-stage" id="mapStage">
      <div class="hud" id="hud">LAT — · LON —</div>
      <div class="breadcrumb" id="breadcrumb" style="display:none;">
        <button class="btn" id="backToWorldBtn">← World Map</button>
        <span id="breadcrumbLabel"></span>
      </div>
      <div class="loading-overlay" id="loadingOverlay" style="display:none;">
        <div class="loading-text" id="loadingText">Loading regions…</div>
      </div>
      <canvas id="globeCanvas"></canvas>
      <svg id="map" viewBox="0 0 960 520" style="display:none;"></svg>
      <div class="annotate-toolbar" id="annotateToolbar" style="display:none;">
        <button class="annotate-btn" id="selectToolBtn" title="Select & drag drawings">🖐️</button>
        <button class="annotate-btn" id="drawToolBtn" title="Draw">✏️</button>
        <button class="annotate-btn" id="fillToolBtn" title="Click a shape to fill it">🪣</button>
        <input type="color" id="annotateColor" value="#ff4136" title="Pen / fill color">
        <input type="range" id="annotateThickness" min="1" max="15" value="3" title="Pen thickness">
        <button class="annotate-btn" id="undoAnnotateBtn" title="Undo (Ctrl+Z)">↩️</button>
        <button class="annotate-btn" id="clearAnnotateBtn" title="Clear all drawings">🗑️</button>
      </div>
      <div class="zoom-controls">
        <button id="zoomIn">+</button>
        <button id="zoomOut">–</button>
      </div>
      <div class="legend">
        <div class="item"><span class="sw" style="background:var(--map-land)"></span> Covered</div>
        <div class="item"><span class="sw" style="background:var(--amber)"></span> Selected</div>
        <div class="item"><span class="sw" style="background:var(--map-land-nocode);border:1px solid var(--map-land-nocode-stroke)"></span> No coverage</div>
      </div>
    </div>

    <aside id="sidePanel">
      <div class="panel-section" id="countriesPanelHeader" style="border-bottom:none; padding-bottom:6px;">
        <h2>All Covered Countries</h2>
        <div class="selected-empty" style="margin-top:-2px;margin-bottom:8px;">Click a country to see all its regions labeled on the map.</div>
      </div>
      <div class="region-list" id="regionList"></div>

      <div class="panel-section" id="countryRegionsPanelHeader" style="display:none;border-bottom:none;padding-bottom:6px;">
        <h2 id="countryRegionsTitle">Regions</h2>
        <div class="selected-empty" style="margin-top:-2px;margin-bottom:8px;">Click a color swatch to assign that region a group, or ✕ to hide it.</div>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn" id="selectAllRegionsBtn" style="flex:1;">Select All</button>
          <button class="btn" id="selectNoneRegionsBtn" style="flex:1;">Select None</button>
        </div>
        <button class="btn" id="hideUnassignedBtn" style="width:100%;margin-top:8px;background:rgba(58,58,74,0.3);border-color:#3a3a4a;color:var(--muted);" title="Hides every region that hasn't been assigned a color yet, leaving only the ones you've explicitly colored visible">🙈 Hide Unassigned Regions</button>
        <button class="btn" id="exportAllBadgesBtn" style="width:100%;margin-top:8px;background:rgba(0,201,167,0.1);border-color:rgba(0,201,167,0.3);color:#00c9a7;">📦 Export All Region Badges</button>
        <div id="exportProgress" style="display:none;font-size:11px;color:var(--muted);margin-top:6px;text-align:center;"></div>
      </div>
      <div class="region-list" id="countryRegionsList" style="display:none;"></div>
    </aside>
  </main>

  <!-- Footer removed per user request — home button in header replaces the "Back to GeoAnalyzerX" link -->

</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script>
/* =========================================================================
   EDIT THIS LIST to add/remove countries. Names must match Natural Earth /
   world-atlas country names (see console warning on load for any that
   didn't match a shape on the map).
   ========================================================================= */
const GEOGUESSR_COUNTRIES = [
  "Albania","Andorra","Argentina","Australia","Austria","Bangladesh","Belgium",
  "Bhutan","Bolivia","Botswana","Brazil","Bulgaria","Cambodia","Canada","Chile",
  "Colombia","Costa Rica","Croatia","Cyprus","Czechia","Denmark",
  "Dominican Republic","Ecuador","Estonia","Eswatini","Finland","France",
  "Georgia","Germany","Ghana","Greece","Greenland","Guatemala","Hungary",
  "Iceland","India","Indonesia","Ireland","Israel","Italy","Japan","Jordan",
  "Kazakhstan","Kenya","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho",
  "Liechtenstein","Lithuania","Luxembourg","Madagascar","Malaysia","Malta",
  "Mexico","Monaco","Mongolia","Montenegro","Namibia","Nepal","Netherlands",

// ── Fallback rotate-to-country + marker ──────────────────────
// Used when a country has no subdivision data (showFallback()) so the
// globe actually rotates to show the country instead of leaving the
// camera wherever it happened to be pointed, AND drops a marker for
// countries too small to appear as their own shape at this map's
// resolution (e.g. American Samoa isn't a distinct shape in the 110m
// world-atlas dataset used to texture the globe, so nothing would ever
// get highlighted there otherwise).
//
// Rather than deriving lat/lon → 3D position from scratch (risky to get
// a sign/axis convention wrong with no way to visually test it here),
// this finds the real vertex on the actual globeMesh geometry whose UV
// matches the target lat/lon, using the exact same UV↔latlon convention
// as globeUvToLatLon() (already verified correct, since hover/click
// hit-testing depends on it). That guarantees the marker and rotation
// always agree with how the sphere is actually textured, whatever the
// underlying orientation convention turns out to be.
function nearestVertexLocalPosition(lat, lon){
  const targetU = (0.5 + lon / 360) % 1;
  const wrappedU = targetU < 0 ? targetU + 1 : targetU;
  const targetV = Math.max(0, Math.min(1, 0.5 - lat / 180));
  const geom = globeMesh.geometry;
  const posAttr = geom.attributes.position;
  const uvAttr = geom.attributes.uv;
  let bestIdx = -1, bestDist = Infinity;
  for(let i = 0; i < uvAttr.count; i++){
    let du = Math.abs(uvAttr.getX(i) - wrappedU);
    du = Math.min(du, 1 - du); // wrap across the u=0/u=1 seam
    const dv = uvAttr.getY(i) - targetV;
    const d = du * du + dv * dv;
    if(d < bestDist){ bestDist = d; bestIdx = i; }
  }
  return new THREE.Vector3(posAttr.getX(bestIdx), posAttr.getY(bestIdx), posAttr.getZ(bestIdx));
}

function rotateGlobeToFace(lat, lon){
  const p = nearestVertexLocalPosition(lat, lon);
  // Rotate about Y only (reset any pitch) so the point ends up centered
  // facing the camera, which sits on the +Z axis looking at the origin.
  const theta = Math.atan2(-p.x, p.z);
  globeGroup.rotation.set(0, theta, 0);
}

  const canvas = document.createElement('canvas');

  globeGroup.rotation.x = Math.max(-1.4, Math.min(1.4, globeGroup.rotation.x + dy * GLOBE_ROT_SPEED));

const globeRaycaster = new THREE.Raycaster();
const globeMouseNDC = new THREE.Vector2();
function globeRaycastAt(clientX, clientY){
  const rect = globeCanvasEl.getBoundingClientRect();
  globeMouseNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  globeMouseNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  globeRaycaster.setFromCamera(globeMouseNDC, globeCamera);
  const hits = globeRaycaster.intersectObject(globeMesh);
  return hits.length ? hits[0] : null;
}
function globeUvToCountryIndex(uv){
  const px = Math.floor(uv.x * GLOBE_TEX_W);
  const py = Math.floor((1 - uv.y) * GLOBE_TEX_H);
  const data = globeIdCtx.getImageData(Math.max(0, Math.min(GLOBE_TEX_W - 1, px)), Math.max(0, Math.min(GLOBE_TEX_H - 1, py)), 1, 1).data;
  return globeIndexFromIdColor(data[0], data[1], data[2]);
}
function globeUvToLatLon(uv){
  return [(0.5 - uv.y) * 180, (uv.x - 0.5) * 360];
}

  const hit = globeRaycastAt(e.clientX, e.clientY);

  const [lat, lon] = globeUvToLatLon(hit.uv);
  document.getElementById('hud').textContent = `LAT ${lat.toFixed(2)} · LON ${lon.toFixed(2)}`;
  const idx = globeUvToCountryIndex(hit.uv);
  const feature = idx >= 0 ? globeFeatures[idx] : null;
  const nm = feature ? worldCountryName(feature) : null;

    const nm = worldCountryName(feature);
    const color = coveredSet.has(normalize(nm)) ? 'rgba(0,201,167,0.82)' : '#14141f';
    globePaintCountry(globeVisibleCtx, feature, color, false);
    globePaintCountry(globeIdCtx, feature, globeIdColorFor(i), true);
  });
  globeTexture.needsUpdate = true;
}

// Converts a raw screen position (clientX/clientY) into the SVG's own
// internal coordinate space — necessary because the SVG has a viewBox
// that's scaled to fill its container, so screen pixels and the SVG's
// internal units aren't 1:1. Using raw pixel math here was the cause of
// the zoom appearing to drift/off-center when zooming.
function toSvgPoint(clientX, clientY){
  const svgNode = svg.node();
  const pt = svgNode.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  const p = pt.matrixTransform(svgNode.getScreenCTM().inverse());
  return [p.x, p.y];
}

// New annotation points need to be stored in "pre-transform" coordinates —
// since they render inside the already-zoomed/panned <g>, whatever the
// current transform is gets applied on top of them. toSvgPoint alone gives
// the raw viewBox-space position, which is only correct at zoom identity;
// at any other zoom/pan state that caused drawings to appear offset from
// the cursor. Inverting the current transform corrects for that.
function toMapPoint(clientX, clientY){
  const t = d3.zoomTransform(svg.node());
  return t.invert(toSvgPoint(clientX, clientY));
}

// Scroll-wheel zoom, handled explicitly (rather than relying on the zoom
// behavior's default wheel handling) so it's guaranteed to work regardless
// of what else is layered over the map, and zooms toward the cursor.
document.getElementById('mapStage').addEventListener('wheel', (event) => {
  event.preventDefault();
  const factor = event.deltaY < 0 ? 1.15 : 1 / 1.15;
  const point = toSvgPoint(event.clientX, event.clientY);
  svg.transition().duration(120).call(zoom.scaleBy, factor, point);
}, { passive: false });

// ── Annotation tool: select/drag, freehand pen, and click-to-fill ──
// All drawing happens directly inside annotationLayer (a child of the
// zoomable <g>), using map-space coordinates via toSvgPoint — so every
// stroke is genuinely attached to the map content, not the screen.
let annotateMode = null; // null | 'select' | 'draw' | 'fill'
let currentDrawPath = null;
let dragTarget = null;
let dragStart = null;
let annotateColor = document.getElementById('annotateColor').value;
let annotateThickness = document.getElementById('annotateThickness').value;
const mapStageEl = document.getElementById('mapStage');

function setAnnotateMode(mode){
  annotateMode = (annotateMode === mode) ? null : mode; // click active tool again to turn it off
  document.getElementById('selectToolBtn').classList.toggle('active', annotateMode === 'select');
  document.getElementById('drawToolBtn').classList.toggle('active', annotateMode === 'draw');
  document.getElementById('fillToolBtn').classList.toggle('active', annotateMode === 'fill');
  // Paths inherit pointer-events from this parent group, so toggling it
  // here is what lets clicks pass through to countries underneath when
  // no annotation tool is active, and become clickable/draggable when one is.
  annotationLayer.style('pointer-events', annotateMode ? 'all' : 'none');
  mapStageEl.style.cursor = annotateMode === 'draw' ? 'crosshair' : annotateMode === 'fill' ? 'pointer' : annotateMode === 'select' ? 'grab' : 'default';
}
document.getElementById('selectToolBtn').onclick = () => setAnnotateMode('select');
document.getElementById('drawToolBtn').onclick = () => setAnnotateMode('draw');
document.getElementById('fillToolBtn').onclick = () => setAnnotateMode('fill');

// Safety net: if anything about the annotation tools ever leaves the page
// feeling unresponsive to clicks, Escape immediately forces every tool off.
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && annotateMode){
    setAnnotateMode(annotateMode); // toggles the currently-active mode off
  }
});
document.getElementById('annotateThickness').addEventListener('input', (e) => { annotateThickness = e.target.value; });

// ── Undo ──────────────────────────────────────────────────
let undoStack = [];
function pushUndo(action){ undoStack.push(action); }
function undo(){
  const action = undoStack.pop();
  if (!action) return;
  if (action.type === 'add'){
    action.node.remove();
  } else if (action.type === 'fill'){
    d3.select(action.node).attr('fill', action.prevFill).attr('fill-opacity', action.prevOpacity);
  } else if (action.type === 'move'){
    d3.select(action.node).attr('transform', `translate(${action.prevTx},${action.prevTy})`);
    const d = d3.select(action.node).datum();
    if (d) { d.tx = action.prevTx; d.ty = action.prevTy; }
  } else if (action.type === 'clear'){
    action.nodes.forEach(n => annotationLayer.node().appendChild(n));
  }
}
document.getElementById('undoAnnotateBtn').onclick = undo;
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z'){
    e.preventDefault();
    undo();
  }
});

document.getElementById('clearAnnotateBtn').onclick = () => {
  if (!confirm('Clear all drawings on this map?')) return;
  const nodes = annotationLayer.selectAll('path').nodes();
  if (nodes.length) pushUndo({ type:'clear', nodes: nodes.map(n => n.cloneNode(true)) });
  annotationLayer.selectAll('*').remove();
};

function startDraw(clientX, clientY){
  const [x, y] = toMapPoint(clientX, clientY);
  currentDrawPath = annotationLayer.append('path')
    .attr('fill', 'none')
    .attr('stroke', annotateColor)
    .attr('stroke-width', annotateThickness)
    .attr('stroke-linecap', 'round')
    .attr('stroke-linejoin', 'round')
    .datum({ pts: [[x, y]], tx: 0, ty: 0 })
    .attr('d', `M${x},${y}`);
}
function moveDraw(clientX, clientY){
  if (!currentDrawPath) return;
  const [x, y] = toMapPoint(clientX, clientY);
  const d = currentDrawPath.datum();
  d.pts.push([x, y]);
  currentDrawPath.attr('d', 'M' + d.pts.map(p => p.join(',')).join('L'));
}
function startDrag(target, clientX, clientY){
  dragTarget = target;
  const d = target.datum() || {};
  d.tx = d.tx || 0; d.ty = d.ty || 0;
  target.datum(d);
  const [x, y] = toMapPoint(clientX, clientY);
  dragStart = { x, y, tx: d.tx, ty: d.ty };
  mapStageEl.style.cursor = 'grabbing';
}
function moveDrag(clientX, clientY){
  if (!dragTarget || !dragStart) return;
  const [x, y] = toMapPoint(clientX, clientY);
  const d = dragTarget.datum();
  d.tx = dragStart.tx + (x - dragStart.x);
  d.ty = dragStart.ty + (y - dragStart.y);
  dragTarget.attr('transform', `translate(${d.tx},${d.ty})`);
}

// Panning the whole map (used by Select mode when the click isn't on an
// existing drawing) — tracked in the SVG's own coordinate space via
// toSvgPoint so it stays correct at any zoom level, then applied
// incrementally each move via zoom.translateBy.
let panLastPoint = null;
function startPan(clientX, clientY){
  panLastPoint = toSvgPoint(clientX, clientY);
  mapStageEl.style.cursor = 'grabbing';
}
function movePan(clientX, clientY){
  if (!panLastPoint) return;
  const cur = toSvgPoint(clientX, clientY);
  zoom.translateBy(svg, cur[0] - panLastPoint[0], cur[1] - panLastPoint[1]);
  panLastPoint = cur;
}

function endInteraction(){
  if (currentDrawPath) pushUndo({ type:'add', node: currentDrawPath.node() });
  if (dragTarget && dragStart) pushUndo({ type:'move', node: dragTarget.node(), prevTx: dragStart.tx, prevTy: dragStart.ty });
  currentDrawPath = null;
  dragTarget = null;
  dragStart = null;
  panLastPoint = null;
  if (annotateMode === 'select') mapStageEl.style.cursor = 'grab';
}

mapStageEl.addEventListener('mousedown', (e) => {
  if (e.target.closest('.annotate-toolbar')) return;
  if (annotateMode === 'draw'){
    startDraw(e.clientX, e.clientY);
    e.preventDefault();
  } else if (annotateMode === 'select'){
    if (e.target.tagName === 'path' && e.target.closest('.annotation-layer')) startDrag(d3.select(e.target), e.clientX, e.clientY);
    else startPan(e.clientX, e.clientY);
    e.preventDefault();
  }
});
mapStageEl.addEventListener('mousemove', (e) => {
  moveDraw(e.clientX, e.clientY);
  moveDrag(e.clientX, e.clientY);
  movePan(e.clientX, e.clientY);
});
mapStageEl.addEventListener('mouseup', endInteraction);
mapStageEl.addEventListener('mouseleave', endInteraction);

mapStageEl.addEventListener('touchstart', (e) => {
  if (!annotateMode || e.target.closest('.annotate-toolbar')) return;
  const t = e.touches[0];
  if (annotateMode === 'draw'){
    startDraw(t.clientX, t.clientY);
  } else if (annotateMode === 'select'){
    if (e.target.tagName === 'path' && e.target.closest('.annotation-layer')) startDrag(d3.select(e.target), t.clientX, t.clientY);
    else startPan(t.clientX, t.clientY);
  }
  e.preventDefault();
}, { passive:false });
mapStageEl.addEventListener('touchmove', (e) => {
  if (!annotateMode) return;
  const t = e.touches[0];
  moveDraw(t.clientX, t.clientY);
  moveDrag(t.clientX, t.clientY);
  movePan(t.clientX, t.clientY);
  e.preventDefault();
}, { passive:false });
mapStageEl.addEventListener('touchend', endInteraction);

mapStageEl.addEventListener('click', (e) => {
  if (annotateMode !== 'fill') return;
  if (e.target.tagName === 'path' && e.target.closest('.annotation-layer')){
    const sel = d3.select(e.target);
    pushUndo({ type:'fill', node: e.target, prevFill: sel.attr('fill'), prevOpacity: sel.attr('fill-opacity') });
    sel.attr('fill', annotateColor).attr('fill-opacity', 0.45);
  }
});

// ── Country-detail sidebar: per-region color picker ─────────
// A small palette of visually distinct colors, plus "Default" (the
// theme's normal highlight color) and "Hide" (dims + hides the label).
// Clicking a swatch immediately recolors that region on the map.
const REGION_PALETTE = [
  { key:'hide',    label:'Hide',    color:null, swatchBg:'#3a3a4a' },
  { key:'default', label:'Default', color:'',   swatchBg:'var(--map-land)' },
  { key:'red5',    label:'Very rare (palest red)',       color:'#f8ddd8' },
  { key:'red1',    label:'Rare (faint red)',        color:'#f1c4bd' },
  { key:'red2',    label:'Uncommon (light red)',    color:'#e8887a' },
  { key:'red3',    label:'Common (medium red)',     color:'#d1443a' },
  { key:'red6',    label:'Deep red (between common and dark)', color:'#a82c24' },
  { key:'red4',    label:'Very common (dark red)',  color:'#8b1e1a' },
  { key:'red7',    label:'Almost everywhere (near-black red)', color:'#5c1310' },
  { key:'blue',    label:'Blue',    color:'#3498db' },
  { key:'green',   label:'Green',   color:'#27ae60' },
  { key:'orange',  label:'Orange',  color:'#f39c12' },
  { key:'purple',  label:'Purple',  color:'#9b59b6' },
  { key:'teal',    label:'Teal',    color:'#16a085' },
  { key:'pink',    label:'Pink',    color:'#e84393' },
  { key:'yellow',  label:'Yellow',  color:'#f1c40f' },
];

function setRegionColor(id, key){
  const entry = REGION_PALETTE.find(p => p.key === key) || REGION_PALETTE[1];
  const path  = countryLayer.select(`path[data-id="${id}"]`);
  const label = labelLayer.select(`g[data-id="${id}"]`);
  if (entry.color === null){
    // Hide — recolors to the muted "no coverage" gray; the shape and
    // border stay visible, just de-emphasized. For a full removal from
    // view, see trueHideRegionShape() below, used only by the bulk
    // "Hide Unassigned Regions" button.
    path.style('display', null).classed('dimmed', true).style('fill', null);
    label.style('display', 'none');
  } else if (entry.color === ''){
    // Default theme color — clear any custom override
    path.style('display', null).classed('dimmed', false).style('fill', null);
    label.style('display', '');
  } else {
    // Custom color override
    path.style('display', null).classed('dimmed', false).style('fill', entry.color);
    label.style('display', '');
  }
}

// Fully removes a region's shape and border from view — unlike
// setRegionColor's 'hide' option above, which just recolors to the
// muted "no coverage" gray but keeps the outline visible. Used only by
// the bulk "Hide Unassigned Regions" button, so a single ✕ click on one
// region still gives the softer gray-out instead.
function trueHideRegionShape(id){
  countryLayer.select(`path[data-id="${id}"]`).style('display', 'none');
  labelLayer.select(`g[data-id="${id}"]`).style('display', 'none');
}

// Applies an arbitrary hex color picked from the color wheel input,
// bypassing the fixed preset list entirely — this tool has no
// persistence layer requiring a stable palette key, it just styles
// the live SVG directly, so any color works with no extra bookkeeping.
function setRegionCustomColor(id, hex){
  const path  = countryLayer.select(`path[data-id="${id}"]`);
  const label = labelLayer.select(`g[data-id="${id}"]`);

}

// ── Bulk region badge export ─────────────────────────────────
// Captures the map's current CSS-styled appearance as a standalone PNG.
// External stylesheet rules (fills via CSS variables, label font styling,
// the ocean gradient's stop-colors) don't survive serializing an SVG
// outside the page, so every relevant element's *computed* style gets
// inlined onto a clone first.
async function captureMapAsPng(){
  const svgNode = document.getElementById('map');
  const clone = svgNode.cloneNode(true);

  const liveEls   = svgNode.querySelectorAll('path, text, stop');
  const clonedEls = clone.querySelectorAll('path, text, stop');
  liveEls.forEach((el, i) => {
    const cs = getComputedStyle(el);
    const target = clonedEls[i];
    if (el.tagName === 'stop'){
      target.setAttribute('stop-color', cs.stopColor || cs.color);
      target.setAttribute('stop-opacity', cs.stopOpacity || '1');
      return;
    }
    target.setAttribute('fill', cs.fill);
    target.setAttribute('stroke', cs.stroke);
    target.setAttribute('stroke-width', cs.strokeWidth);
    if (el.tagName === 'text'){
      target.setAttribute('font-family', cs.fontFamily);
      target.setAttribute('font-size', cs.fontSize);
      target.setAttribute('font-weight', cs.fontWeight);
    }
  });

  const w = svgNode.clientWidth  * 2;  // 2x for a higher-res export
  const h = svgNode.clientHeight * 2;
  clone.setAttribute('width', w);
  clone.setAttribute('height', h);

  const svgString = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('toBlob failed')), 'image/png');
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('SVG image load failed')); };
    img.src = url;
  });
}

function downloadBlob(blob, filename){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

async function exportAllRegionBadges(){
  if (!currentLabelData || !currentLabelData.length){
    alert('Drill into a country first, then try exporting.');
    return;
  }
  const btn = document.getElementById('exportAllBadgesBtn');
  const progressEl = document.getElementById('exportProgress');
  btn.disabled = true;
  progressEl.style.display = 'block';

  const wasLabelsHidden = document.body.classList.contains('labels-hidden');
  applyLabelsVisibility(true); // clean badges shouldn't have text labels on them

  for (let i = 0; i < currentLabelData.length; i++){
    const region = currentLabelData[i];
    progressEl.textContent = `Exporting ${i+1} / ${currentLabelData.length}: ${region.name}...`;

    currentLabelData.forEach(r => setRegionColor(r.id, r.id === region.id ? 'default' : 'hide'));
    // Two animation-frame waits so the browser has actually repainted the
    // new colors before we capture — otherwise this can grab a stale frame.
    await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

    try {
      const blob = await captureMapAsPng();
      const safeCountry = (currentCountryName || 'country').replace(/[^a-z0-9]+/gi, '-');
      const safeRegion  = region.name.replace(/[^a-z0-9]+/gi, '-');
      downloadBlob(blob, `${safeCountry}-${safeRegion}.png`);
    } catch(e) {
      console.error('Export failed for', region.name, e);
    }
    // Small gap between downloads — firing many at once in a tight loop is
    // more likely to trip a browser's automatic-download safety prompt.
    await new Promise(r => setTimeout(r, 350));
  }

  currentLabelData.forEach(r => setRegionColor(r.id, 'default'));
  applyLabelsVisibility(wasLabelsHidden);
  buildCountryRegionsList(currentLabelData); // refresh sidebar swatches to match
  progressEl.textContent = `Done — exported ${currentLabelData.length} badges.`;
  setTimeout(() => { progressEl.style.display = 'none'; }, 4000);
  btn.disabled = false;
}
document.getElementById('exportAllBadgesBtn').onclick = exportAllRegionBadges;

function subdivisionName(props, i){
  const raw = (props && (props.shapeName || props.shapeGroup)) || `Region ${i+1}`;
  // Strip the redundant "Prefecture" suffix (Japan) — every region in a
  // country-detail view is obviously a subdivision of that country already,
  // so the suffix adds nothing but length, which matters a lot for label
  // decluttering on densely-divided countries.
  return raw.replace(/\s+Prefecture\b/i, '').trim();
}

// Some simplified boundary files have polygons wound in the wrong
// direction (a known artifact of certain simplification pipelines on very
// complex coastlines). A backwards-wound ring makes d3 render/measure the
// *inverse* of the shape — i.e. the whole world except the region — which
// looks like a giant solid blob. This normalizes every ring to the correct
// right-hand-rule winding (outer rings CCW, holes CW) before we touch it.
function rawCoordExtent(geometry){
  let minLon = Infinity, maxLon = -Infinity, minLat = Infinity, maxLat = -Infinity;
  function walk(node){
    if(typeof node[0] === 'number'){
      const lon = node[0], lat = node[1];
      if(lon < minLon) minLon = lon;
      if(lon > maxLon) maxLon = lon;
      if(lat < minLat) minLat = lat;
      if(lat > maxLat) maxLat = lat;
    } else {
      for(const child of node) walk(child);
    }
  }
  if(geometry && geometry.coordinates) walk(geometry.coordinates);
  return [minLon, minLat, maxLon, maxLat];
}

function flipAllRings(geom){
  if(!geom) return;
  if(geom.type === 'Polygon') geom.coordinates.forEach(r => r.reverse());
  else if(geom.type === 'MultiPolygon') geom.coordinates.forEach(poly => poly.forEach(r => r.reverse()));
}
// A correctly-wound single administrative region should cover a tiny sliver
// of the globe's surface (a fraction of a steradian). If our shoelace-based
// rewind still leaves a feature covering more than half the sphere, the
// winding is still backwards (our convention assumption didn't match this
// data) — so just flip every ring outright and re-measure. This is a
// self-verifying fix: it doesn't rely on guessing the "correct" convention,
// it directly checks the actual resulting area and corrects if wrong.
function fixInvertedArea(feature){
  let a = Math.abs(d3.geoArea(feature));
  if(a > 2 * Math.PI){
    flipAllRings(feature.geometry);
    const a2 = Math.abs(d3.geoArea(feature));
    console.warn('[Region Map] corrected inverted-fill region:', (feature.properties && feature.properties.shapeName) || '(unnamed)', '— area', a.toFixed(3), '→', a2.toFixed(3), 'sr');
  }
}
function ringSignedArea(ring){
  let sum = 0;
  for(let i = 0; i < ring.length - 1; i++){
    sum += ring[i][0] * ring[i+1][1] - ring[i+1][0] * ring[i][1];
  }
  return sum / 2;
}
function rewindRing(ring, clockwise){
  const isCW = ringSignedArea(ring) < 0;
  if(isCW !== clockwise) ring.reverse();
  return ring;
}
function rewindPolygonCoords(coords){
  if(!coords.length) return coords;
  coords[0] = rewindRing(coords[0], false);
  for(let i = 1; i < coords.length; i++) coords[i] = rewindRing(coords[i], true);
  return coords;
}
function rewindGeometry(geom){
  if(!geom) return geom;
  if(geom.type === 'Polygon') geom.coordinates = rewindPolygonCoords(geom.coordinates);
  else if(geom.type === 'MultiPolygon') geom.coordinates = geom.coordinates.map(rewindPolygonCoords);
  return geom;
}

function renderCountryView(countryName, geojson){
  hideLoading();
  clearFallbackMarker();

  let features = (geojson.features || [])
    .filter(f => f.geometry)
    .filter(f => {
      const nm = (f.properties && f.properties.shapeName) || '';
      if(/antarc/i.test(nm)) return false;
      // Distant offshore territories included in some countries' ADM1 sets
      // (e.g. US insular territories, and Hawaii for the USA) sit thousands
      // of km from the main landmass. Including them forces the map to zoom
      // out so far that the country's actual mainland gets squeezed into a
      // tiny corner, so they are excluded from this reference-map view.
      if(/puerto rico|guam\b|american samoa|northern mariana|u\.?s\.? virgin islands|^virgin islands|hawaii/i.test(nm)) return false;
      return true;
    });

  features.forEach(f => { rewindGeometry(f.geometry); fixInvertedArea(f); });

  // Some datasets include a stray "whole country" entry alongside the real
  // subdivisions (e.g. a region literally named "United States" inside the
  // USA's state list). We only drop a same-named entry when it's ALSO
  // suspiciously large relative to the rest — some countries legitimately
  // have a subdivision that shares the country's name (e.g. Mexico has a
  // "México" state, Panama a "Panamá" province), and those are small, real
  // regions that must not be filtered out just for sharing a name.
  {
    const areas = features.map(f => Math.abs(d3.geoArea(f)));
    const totalArea = areas.reduce((s, a) => s + a, 0) || 1;
    const cnN = normalize(countryName);
    features = features.filter((f, i) => {
      const nmN = normalize((f.properties && f.properties.shapeName) || '');
      const sameName = nmN === cnN || cnN.startsWith(nmN) || nmN.startsWith(cnN);
      const dominant = areas[i] / totalArea > 0.5;
      if(sameName && dominant){
        console.warn('[Region Map] dropping likely whole-country duplicate entry:', f.properties && f.properties.shapeName);
        return false;
      }
      return true;
    });
  }

  // Defensive sanity filter: drop any feature that falls well outside this
  // country's real-world extent (known from the reliable world map data).
  // We scan raw coordinate values directly rather than using d3's bounds
  // calculation, since that can be fooled by ring-winding artifacts in
  // simplified source data — a raw scan can't be tricked that way.
  const trusted = flyIndex[normalize(countryName)] && flyIndex[normalize(countryName)].geoBounds;
  const PAD = 12; // degrees of slack for offshore territories/islands
  features = features.filter(f => {
    const [minLon, minLat, maxLon, maxLat] = rawCoordExtent(f.geometry);
    if(!isFinite(minLon)) return false;
    if(!trusted) return true; // no reference available, keep as-is
    const [[tLon0, tLat0], [tLon1, tLat1]] = trusted;
    const ok = minLon >= tLon0 - PAD && maxLon <= tLon1 + PAD &&
               minLat >= tLat0 - PAD && maxLat <= tLat1 + PAD;
    if(!ok) console.warn('[Region Map] dropping out-of-bounds region geometry:', f.properties && f.properties.shapeName);
    return ok;
  });

  if(!features.length){
    showFallback(countryName, 'No usable region boundaries were returned for this country.');
    return;
  }

  // Final safety net: measure how each shape actually RENDERS after
  // projection and drop anything absurdly oversized compared to the rest.
  // This catches rendering-level issues (e.g. self-intersecting or
  // inverted-fill geometry) that can slip past a raw-coordinate check,
  // by judging the actual visual result rather than the source data.
  function fitAndPruneByRenderedArea(feats){
    let current = feats;
    for(let pass = 0; pass < 3; pass++){
      const proj = d3.geoMercator().fitExtent([[30,60],[width-30,height-30]], { type: 'FeatureCollection', features: current });
      const p = d3.geoPath(proj);
      const viewportArea = (width - 60) * (height - 90);
      const areas = current.map(f => Math.abs(p.area(f)));
      const sorted = [...areas].sort((a,b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)] || 1;
      const good = [], bad = [];
      current.forEach((f, i) => {
        const a = areas[i];
        const oversized = a > viewportArea * 0.55 || (current.length > 1 && a > median * 25 && a > viewportArea * 0.15);
        (oversized ? bad : good).push(f);
      });
      if(!bad.length || !good.length) return { projection: proj, path: p, features: current };
      bad.forEach(f => console.warn('[Region Map] dropping oversized-render region:', (f.properties && f.properties.shapeName) || '(unnamed)'));
      current = good;
    }
    const proj = d3.geoMercator().fitExtent([[30,60],[width-30,height-30]], { type: 'FeatureCollection', features: current });
    return { projection: proj, path: d3.geoPath(proj), features: current };
  }

  const pruned = fitAndPruneByRenderedArea(features);
  features = pruned.features;
  const localProjection = pruned.projection;
  const localPath = pruned.path;

  if(!features.length){
    showFallback(countryName, 'No usable region boundaries were returned for this country.');
    return;
  }
  activeProjection = localProjection;
  document.getElementById('sphereBg').style.display = 'none';

  svg.call(zoom.transform, d3.zoomIdentity);
  countryLayer.selectAll('*').remove();
  labelLayer.selectAll('*').remove();

  countryLayer.selectAll('path')
    .data(features)
    .join('path')
    .attr('class', 'subdivision')
    .attr('data-id', (d, i) => 'sub-' + i)
    .attr('d', localPath);

  // Show every region's label immediately — no click/selection needed.
  // With densely-divided countries (e.g. Spain's 17 communities, Indonesia's
  // 30+ provinces) labels placed at raw centroids overlap heavily, so we
  // run a lightweight force-based decluttering pass: labels gently repel
  // each other when they overlap, while a weak spring pulls each one back
  // toward its true location. A thin leader line connects the label back
  // to its region if it had to move.
  // Label box size must match whichever theme is active — Google-style
  // renders notably bigger text, so the decluttering algorithm needs
  // proportionally bigger reserved space or labels will overlap again.
  const isGoogleTheme = document.body.classList.contains('google-theme');
  const labelFontPx = isGoogleTheme ? 14 : 9;
  const CHAR_W = 5.4 * (labelFontPx / 9), LABEL_H = 11 * (labelFontPx / 9);
  const fontScale = features.length > 45 ? 0.68 : features.length > 30 ? 0.78 : features.length > 18 ? 0.9 : 1;

  const labelData = features.map((d, i) => {
    const nm = subdivisionName(d.properties, i);
    const [ox, oy] = localPath.centroid(d);
    const w = nm.length * CHAR_W * fontScale + 10;
    const h = LABEL_H * fontScale;
    return { id: 'sub-' + i, name: nm, ox, oy, x: ox, y: oy, w, h };
  });

  // Force-based decluttering: a weak spring pulls each label back toward
  // its true centroid, while overlapping labels repel each other. Tuned to
  // favour spreading (weak spring, strong repulsion, generous margin,
  // plenty of iterations) since a slightly-displaced-but-readable label
  // beats an overlapping one — this applies to every country, not just
  // especially dense ones, so all region maps stay legible.
  const iterations = Math.min(1400, 500 + features.length * 12);
  for(let iter = 0; iter < iterations; iter++){
    for(const a of labelData){
      a.x += (a.ox - a.x) * 0.008;
      a.y += (a.oy - a.y) * 0.008;
    }
    for(let i = 0; i < labelData.length; i++){
      for(let j = i + 1; j < labelData.length; j++){
        const a = labelData[i], b = labelData[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const overlapX = (a.w + b.w) / 2 + 5 - Math.abs(dx);
        const overlapY = (a.h + b.h) / 2 + 4 - Math.abs(dy);
        if(overlapX > 0 && overlapY > 0){
          if(overlapX < overlapY){
            const push = overlapX / 2 * 1.5 * (dx < 0 ? -1 : 1) || 0.7;
            a.x -= push; b.x += push;
          } else {
            const push = overlapY / 2 * 1.5 * (dy < 0 ? -1 : 1) || 0.7;
            a.y -= push; b.y += push;
          }
        }
      }
    }
  }

  labelData.forEach(l => {
    const gLabel = labelLayer.append('g').attr('data-id', l.id);
    const moved = Math.hypot(l.x - l.ox, l.y - l.oy) > 6;
    if(moved){
      gLabel.append('line')
        .attr('x1', l.ox).attr('y1', l.oy)
        .attr('x2', l.x).attr('y2', l.y)
        .attr('stroke', 'var(--muted-2)').attr('stroke-width', 0.6);
    }
    gLabel.append('circle').attr('cx', l.ox).attr('cy', l.oy).attr('r', 2.5);
    gLabel.append('text')
      .attr('x', l.x + 6).attr('y', l.y + 3)
      .attr('font-size', 9 * fontScale)
      .text(l.name);
  });

  document.getElementById('breadcrumb').style.display = 'flex';
  document.getElementById('breadcrumbLabel').innerHTML =
    `Viewing regions of <b>${countryName}</b>`;

  document.querySelectorAll('.region-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.name === normalize(countryName))
  );

  showCountryRegionsPanel(countryName, labelData);
}

// For a country with no ADM1 subdivision data available, this draws just
// the country's own plain outline in the same flat 2D view — the solid-
// fill shape with no internal borders, same as any subdivision-less
// single region would look. This reuses the world-atlas shape already
// used for the globe texture, rather than fetching anything new.
// Returns false (and draws nothing) if this country isn't a distinct
// shape at the world-atlas's resolution either — the caller should fall
// back further in that case (e.g. to showFallback's globe+marker).
// Draws a single country/territory feature as a plain solid-fill shape
// with no internal borders — shared by both the fast local world-atlas
// lookup and the geoBoundaries ADM0 fetch below, so both tiers end up
// looking identical regardless of which data source supplied the shape.
function renderPlainCountryFeature(countryName, feature){
  const clone = JSON.parse(JSON.stringify(feature));
  rewindGeometry(clone.geometry);
  fixInvertedArea(clone);

  const localProjection = d3.geoMercator().fitExtent([[30,60],[width-30,height-30]], clone);
  const localPath = d3.geoPath(localProjection);

  hideLoading();
  clearFallbackMarker();
  activeProjection = localProjection;
  document.getElementById('sphereBg').style.display = 'none';

  svg.call(zoom.transform, d3.zoomIdentity);
  countryLayer.selectAll('*').remove();
  labelLayer.selectAll('*').remove();

  countryLayer.selectAll('path')
    .data([clone])
    .join('path')
    .attr('class', 'subdivision')
    .attr('data-id', 'sub-0')
    .attr('d', localPath);

  document.getElementById('breadcrumb').style.display = 'flex';
  document.getElementById('breadcrumbLabel').innerHTML =
    `<b>${countryName}</b> — No subdivision data available. Showing country outline instead.`;

  document.querySelectorAll('.region-chip').forEach(c =>
    c.classList.toggle('active', c.dataset.name === normalize(countryName))
  );

  showCountryRegionsPanel(countryName, []);
}

// Fast, no-network path: uses the shape already loaded for the globe's
// texture. Works for most countries but NOT for small territories that
// are below this dataset's simplification threshold (Christmas Island,
// American Samoa, etc. — those return false here and need the
// geoBoundaries fetch below instead).
function renderCountryOutlineOnly(countryName){
  const entry = flyIndex[normalize(countryName)];
  if(!entry) return false;
  const feature = worldFeatureCollection.features.find(f => String(f.id) === String(entry.id));
  if(!feature || !feature.geometry) return false;
  renderPlainCountryFeature(countryName, feature);
  return true;
}

// iso3 -> fetched ADM0 (whole-country) feature, or null if unavailable.
const countryOutlineCache = new Map();

// Same backend used across the rest of the project (admin.html, etc.).
const API_BASE = 'https://geoanalyzerx.onrender.com';

// The full "show me some outline of this country" fallback chain:
//   1. Fast local world-atlas shape (renderCountryOutlineOnly) — works
//      for most countries, but not for small territories below this
//      dataset's simplification threshold.
//   2. This country/territory's boundary from our backend, which fetches
//      it from OpenStreetMap's Nominatim. Needed specifically for small
//      territories: geoBoundaries only tracks the 195 UN member states
//      plus Greenland, Taiwan, Niue, and Kosovo, so it can never cover
//      places like American Samoa or Christmas Island — this is why
//      that's no longer the second tier here.
//   3. Last resort: rotate the globe + drop a named marker (showFallback)
function tryRenderCountryOutline(name){
  if(renderCountryOutlineOnly(name)) return;

  const cacheKey = normalize(name);
  if(countryOutlineCache.has(cacheKey)){
    const cached = countryOutlineCache.get(cacheKey);
    if(cached){
      renderPlainCountryFeature(name, cached);
    } else {
      showFallback(name, 'No shape data available for this country.');
    }
    return;
  }

  showLoading(`Loading ${name} outline…`);
  const url = `${API_BASE}/geo/country-outline?name=${encodeURIComponent(name)}`;
  fetch(url, { cache: 'no-store' })
    .then(res => { if(!res.ok) throw new Error('not found'); return res.json(); })
    .then(feature => {
      const valid = feature && feature.geometry ? feature : null;
      countryOutlineCache.set(cacheKey, valid);
      if(valid){
        renderPlainCountryFeature(name, valid);
      } else {
        showFallback(name, 'No shape data available for this country.');
      }
    })
    .catch(() => {
      countryOutlineCache.set(cacheKey, null);
      showFallback(name, 'No shape data available for this country.');
    });
}

function showFallback(countryName, message){
  hideLoading();
  // Switch back to the interactive 3D globe. Without this, we stay in
  // whatever view drillIntoCountry() switched to (showDrillDownView(),
  // which hides the globe canvas and shows the flat SVG) — and since
  // nothing ever gets drawn into that flat SVG in the fallback case, the
  // user is left looking at just the raw whole-world sphere outline at a
  // projection/viewport mismatch, which renders as a giant meaningless
  // arc rather than a sensible "world map with this country highlighted."
  showGlobeView();
  document.getElementById('sphereBg').style.display = '';
  renderWorldMap();
  activeProjection = projection;
  const entry = flyIndex[normalize(countryName)];
  document.getElementById('breadcrumb').style.display = 'flex';
  document.getElementById('breadcrumbLabel').innerHTML =
    `<b>${countryName}</b> — ${message} Showing country outline instead.`;
  if(entry){
    toggleCountry(entry.id, countryName, entry.centroid, selected.has(String(entry.id)));
  }
  // Rotate the globe to actually face the country, and drop a marker.
  // The marker matters most for countries too small to render as their
  // own shape at this map's resolution (American Samoa, Monaco, Jersey,
  // etc.) — those are already invisible in the globe's texture even
  // though they're "covered," so without a marker there's nothing on
  // screen to indicate where they are at all.
  const coords = COUNTRY_CENTRES[normalize(countryName)];
  if(coords){
    rotateGlobeToFace(coords[0], coords[1]);
    showFallbackMarker(coords[0], coords[1], countryName);
  } else {
    clearFallbackMarker();
  }
  showCountriesPanel();
}

// Some countries are more useful/complete shown at a deeper
// subdivision level than the default ADM1 (region/state) — e.g. the
// Philippines' ADM1 regions dataset from geoBoundaries doesn't
// reliably include newer groupings like the Bangsamoro Autonomous
// Region, but the individual PROVINCES within it (Maguindanao, Sulu,
// Basilan, Tawi-Tawi, etc.) are still tracked correctly at ADM2 level
// regardless of which region they're grouped under.
const ADMIN_LEVEL_OVERRIDE = {
  "Philippines": "ADM2",
};

function drillIntoCountry(name){
  showDrillDownView();
  const iso3 = ISO3[name];
  if(!iso3){
    tryRenderCountryOutline(name);
    return;
  }
  if(subregionCache.has(iso3)){
    const cached = subregionCache.get(iso3);
    if(cached === null){
      tryRenderCountryOutline(name);
    } else {
      renderCountryView(name, cached);
    }
    return;
  }

  const admLevel = ADMIN_LEVEL_OVERRIDE[name] || 'ADM1';
  showLoading(`Loading ${name} ${admLevel === 'ADM2' ? 'provinces' : 'regions'}…`);
  const url = `https://media.githubusercontent.com/media/wmgeolab/geoBoundaries/main/releaseData/gbOpen/${iso3}/${admLevel}/geoBoundaries-${iso3}-${admLevel}_simplified.geojson`;

  fetch(url)
    .then(res => { if(!res.ok) throw new Error('not found'); return res.json(); })
    .then(geojson => {
      subregionCache.set(iso3, geojson);
      renderCountryView(name, geojson);
    })
    .catch(() => {
      subregionCache.set(iso3, null);
      tryRenderCountryOutline(name);
    });
}

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(world => {
  worldFeatureCollection = topojson.feature(world, world.objects.countries);
  renderWorldMap();
  resizeGlobeRenderer();
  if (!globeAnimationStarted){
    globeAnimationStarted = true;
    animateGlobe();
  }

  // build fly-to index for fallback highlighting + unmatched-name check
  const matchedNames = new Set();
  const unmatched = [];
  worldFeatureCollection.features.forEach(d => {
    const nm = worldCountryName(d);
    if(coveredSet.has(normalize(nm))){
      matchedNames.add(normalize(nm));
      const gb = d3.geoBounds(d);
      // d3.geoBounds is unreliable for shapes that cross the antimeridian
      // (e.g. Russia, Fiji) — it can return a bounding box that's wrapped
      // the "long way around" (near-global width, or min > max longitude).
      // Using that as a sanity-check reference would incorrectly reject
      // almost every real subdivision, so such countries are simply not
      // given a trusted reference at all (other filters still apply).
      const crossesAntimeridian = gb && (gb[0][0] > gb[1][0] || (gb[1][0] - gb[0][0]) > 300);
      flyIndex[normalize(nm)] = { id: d.id, centroid: path.centroid(d), bounds: path.bounds(d), geoBounds: crossesAntimeridian ? null : gb };
    }
  });
  console.log('[Region Map] matched', matchedNames.size, 'covered shapes on the map.');
  GEOGUESSR_COUNTRIES.forEach(canonical => {
    const variants = ALIASES[canonical] || [canonical];
    for(const v of variants){
      if(flyIndex[normalize(v)]){
        flyIndex[normalize(canonical)] = flyIndex[normalize(v)];
        break;
      }
    }
    if(!flyIndex[normalize(canonical)]) unmatched.push(canonical);
  });
  if(unmatched.length){
    console.warn('[Region Map] No shape found at this map resolution for:', unmatched);
  }
});

// search filter
document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = normalize(e.target.value);
  document.querySelectorAll('.region-chip').forEach(chip => {
    chip.classList.toggle('hidden', q.length > 0 && !chip.dataset.name.includes(q));
  });
});
document.getElementById('searchInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    const visible = [...document.querySelectorAll('.region-chip:not(.hidden)')];
    if(visible.length) visible[0].click();
  }
});
</script>
