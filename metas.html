<style>
:root {
  --bg: #080810; --bg2: #0d0d18; --card: #10101e; --card2: #14142a;
  --border: #1e1e38; --text: #e0e0f0; --muted: #8888aa; --teal: #00c9a7;
  --purple: #7c3aed; --red: #ff6b6b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; }

/* Nav */
nav { position:sticky;top:0;z-index:100;background:rgba(8,8,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between; }
.nav-logo { display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none; }
.nav-logo span { font-size:17px;font-weight:700;background:linear-gradient(135deg,#00c9a7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.nav-logo img { width:32px;height:32px;object-fit:contain; }
.nav-right { display:flex;align-items:center;gap:16px; }
.nav-right a { color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s; }
.nav-right a:hover { color:var(--teal); }
.back-btn { display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s; }
.back-btn:hover { color:var(--teal); }

/* Map view */
#map-view { display:block; }
.map-header { text-align:center;padding:48px 20px 24px; }
.map-header h1 { font-size:36px;font-weight:800;margin-bottom:8px; }
.map-header p { color:var(--muted);font-size:16px; }
.legend { display:flex;gap:24px;justify-content:center;margin:16px 0 8px;flex-wrap:wrap; }
.legend-item { display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted); }
.legend-dot { width:14px;height:14px;border-radius:3px; }

#world-map { width:100%;max-width:1100px;margin:0 auto;display:block;padding:0 16px; }

.country-path { cursor:pointer;transition:opacity .15s; }
.country-path:hover { opacity:0.75; }
.country-path.geoguessr { fill:#00c9a7; }
.country-path.no-coverage { fill:#1e1e38;cursor:default; }
.country-path.geoguessr:hover { fill:#00e6bf; }

.map-tooltip {
  position:fixed;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;
  pointer-events:none;z-index:200;display:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.map-tooltip .tt-flag { font-size:18px;margin-right:6px; }
.map-tooltip .tt-hint { color:var(--teal);font-size:11px;font-weight:400;margin-top:2px; }
.map-tooltip .tt-nope { color:var(--muted);font-size:11px;font-weight:400;margin-top:2px; }

/* Country grid (below map) */
.country-grid { max-width:1100px;margin:24px auto 64px;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px; }
.country-card { background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text); }
.country-card:hover { border-color:var(--teal);background:rgba(0,201,167,0.06);transform:translateY(-1px); }
.country-card .flag { font-size:20px;line-height:1; }
.country-card .name { font-size:13px;font-weight:600; }

/* Country page */
#country-view { display:none; }
.country-hero { padding:64px 20px 40px;max-width:860px;margin:0 auto;text-align:center; }
.country-flag-big { font-size:64px;margin-bottom:16px;line-height:1; }
.country-hero h1 { font-size:42px;font-weight:800;margin-bottom:8px; }
.country-hero .sub { color:var(--muted);font-size:16px; }
.guide-body { max-width:860px;margin:0 auto;padding:0 20px 80px; }
.guide-section { background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px; }
.guide-section h2 { font-size:16px;font-weight:700;color:var(--teal);margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px; }
.guide-section p, .guide-section li { color:#c0c0d8;line-height:1.7;font-size:15px; }
.guide-section ul { padding-left:18px; }
.guide-section li { margin-bottom:8px; }
.clue-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px; }
.clue-card { background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:14px 16px; }
.clue-card .clue-icon { font-size:22px;margin-bottom:6px; }
.clue-card .clue-title { font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px; }
.clue-card .clue-text { font-size:12px;color:var(--muted);line-height:1.5; }
.confuse-item { background:var(--card2);border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:8px; }
.confuse-item .confuse-country { font-weight:700;margin-bottom:4px;font-size:14px; }
.confuse-item .confuse-diff { font-size:13px;color:#c0c0d8; }
.loading-pulse { text-align:center;padding:80px 20px;color:var(--muted); }
.loading-pulse .spinner { width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>

// Remove duplicates by slug
const seenSlugs = new Set();
const UNIQUE_COUNTRIES = COUNTRIES.filter(c => {
  if(seenSlugs.has(c.slug)) return false;
  seenSlugs.add(c.slug);
  return true;
});

const isoToCountry = {};
UNIQUE_COUNTRIES.forEach(c => { isoToCountry[c.iso] = c; });

const slugToCountry = {};
UNIQUE_COUNTRIES.forEach(c => { slugToCountry[c.slug] = c; });

const tooltip = document.getElementById('tooltip');

// Build the country grid
const grid = document.getElementById('country-grid');
UNIQUE_COUNTRIES.sort((a,b) => a.name.localeCompare(b.name)).forEach(c => {
  const el = document.createElement('a');
  el.className = 'country-card';
  el.href = `/metas/${c.slug}`;
  el.innerHTML = `<span class="flag">${c.flag}</span><span class="name">${c.name}</span>`;
  el.addEventListener('click', e => { e.preventDefault(); navigateTo(c.slug); });
  grid.appendChild(el);
});

// D3 world map
const svg = d3.select('#world-map');
const projection = d3.geoNaturalEarth1()
  .scale(155)
  .translate([500, 265]);
const path = d3.geoPath().projection(projection);

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    const countries = topojson.feature(world, world.objects.countries);
    // Map numeric ID -> ISO alpha-2 using a lookup table
    svg.selectAll('.country-path')
      .data(countries.features)
      .enter().append('path')
      .attr('class', d => {
        const iso = numToISO[d.id];
        return 'country-path ' + (iso && GEOGUESSR_COUNTRIES.has(iso) ? 'geoguessr' : 'no-coverage');
      })
      .attr('d', path)
      .on('mousemove', function(event, d) {
        const iso = numToISO[d.id];
        const c = iso && isoToCountry[iso];
        if (!c) return;
        tooltip.style.display = 'block';
        tooltip.style.left = (event.clientX + 14) + 'px';
        tooltip.style.top  = (event.clientY - 40) + 'px';
        document.getElementById('tt-flag').textContent = c.flag;
        document.getElementById('tt-name').textContent = c.name;
        document.getElementById('tt-hint').innerHTML = GEOGUESSR_COUNTRIES.has(iso)
          ? '<span class="tt-hint">Click for GeoGuessr guide →</span>'
          : '<span class="tt-nope">No GeoGuessr coverage</span>';
      })
      .on('mouseleave', () => { tooltip.style.display = 'none'; })
      .on('click', (event, d) => {
        const iso = numToISO[d.id];
        const c = iso && isoToCountry[iso];
        if (!c || !GEOGUESSR_COUNTRIES.has(iso)) return;
        navigateTo(c.slug);
      });
  });

// Navigation
function navigateTo(slug) {
  const c = slugToCountry[slug];
  if (!c) return;
  history.pushState({slug}, '', `/metas/${slug}`);
  showCountry(c);
}

function showMap() {
  document.getElementById('map-view').style.display = 'block';
  document.getElementById('country-view').style.display = 'none';
  history.pushState({}, '', '/metas');
}

async function showCountry(c) {
  document.getElementById('map-view').style.display = 'none';
  const cv = document.getElementById('country-view');
  cv.style.display = 'block';
  document.getElementById('cv-flag').textContent = c.flag;
  document.getElementById('cv-name').textContent = c.name;
  document.getElementById('cv-sub').textContent = 'GeoGuessr Country Meta Guide';
  document.getElementById('cv-body').innerHTML = `<div class="loading-pulse"><div class="spinner"></div><div>Generating ${c.name} guide with AI...</div></div>`;
  window.scrollTo(0,0);

  try {
    const res = await fetch(`${API}/ai/country_meta`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({country: c.name, iso: c.iso})
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    renderGuide(c, data);
  } catch(e) {
    document.getElementById('cv-body').innerHTML = `<div class="loading-pulse" style="color:#ff6b6b">Failed to load guide. Please try again.</div>`;
  }
}

function renderGuide(c, data) {
  const clues = (data.visual_clues || []).map(cl => `
    <div class="clue-card">
      <div class="clue-icon">${cl.icon || '📍'}</div>
      <div class="clue-title">${cl.title}</div>
      <div class="clue-text">${cl.detail}</div>
    </div>`).join('');

  const confuse = (data.easy_to_confuse || []).map(x => `
    <div class="confuse-item">
      <div class="confuse-country">${x.country}</div>
      <div class="confuse-diff">${x.difference}</div>
    </div>`).join('');

  document.getElementById('cv-body').innerHTML = `
    <div class="guide-section">
      <h2>🔑 Dead Giveaway</h2>
      <p style="font-size:17px;font-weight:600;color:#00c9a7;">${data.dead_giveaway || ''}</p>
    </div>
    <div class="guide-section">
      <h2>👁️ Key Visual Clues</h2>
      <div class="clue-grid">${clues}</div>
    </div>
    ${data.landscape ? `<div class="guide-section"><h2>🌍 Landscape & Terrain</h2><p>${data.landscape}</p></div>` : ''}
    ${data.road_meta ? `<div class="guide-section"><h2>🛣️ Road Meta</h2><p>${data.road_meta}</p></div>` : ''}
    ${data.language_signs ? `<div class="guide-section"><h2>🔤 Language & Signs</h2><p>${data.language_signs}</p></div>` : ''}
    ${data.vehicles ? `<div class="guide-section"><h2>🚗 Vehicles & Infrastructure</h2><p>${data.vehicles}</p></div>` : ''}
    ${confuse ? `<div class="guide-section"><h2>⚠️ Easy to Confuse With</h2>${confuse}</div>` : ''}
    ${data.pro_tips ? `<div class="guide-section"><h2>⚡ Pro Tips</h2><p>${data.pro_tips}</p></div>` : ''}
    <div style="text-align:center;margin-top:32px;">
      <button onclick="showMap()" style="background:var(--card);border:1px solid var(--border);color:var(--muted);padding:12px 24px;border-radius:10px;cursor:pointer;font-size:14px;transition:all .2s;" onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">← Back to World Map</button>
    </div>`;
}

// Handle browser back/forward
window.addEventListener('popstate', () => {
  const path = window.location.pathname;
  const match = path.match(/^\/metas\/(.+)$/);
  if (match) {
    const c = slugToCountry[match[1]];
    if (c) { showCountry(c); return; }
  }
  document.getElementById('map-view').style.display = 'block';
  document.getElementById('country-view').style.display = 'none';
});

// Load directly to country page if URL has a slug (path OR ?c= query param from 404 redirect)
window.addEventListener('DOMContentLoaded', () => {
  const path = window.location.pathname;
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('c') || (path.match(/^\/metas\/(.+)$/) || [])[1];
  if (slug) {
    const c = slugToCountry[slug];
    if (c) {
      // Clean up the URL to look like /metas/country
      history.replaceState({slug}, '', `/metas/${slug}`);
      showCountry(c);
    }
  }
});
