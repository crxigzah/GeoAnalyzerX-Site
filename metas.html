<style>
:root {
  --bg: #080810; --bg2: #0d0d18; --card: #10101e; --card2: #14142a;
  --border: #1e1e38; --text: #e0e0f0; --muted: #8888aa; --teal: #00c9a7;
  --purple: #7c3aed; --red: #ff6b6b;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:
    radial-gradient(ellipse 900px 500px at 20% 0%, rgba(0,201,167,0.10), transparent 60%),
    radial-gradient(ellipse 700px 500px at 85% 15%, rgba(124,58,237,0.09), transparent 60%),
    radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px) 0 0/28px 28px,
    var(--bg);
  background-attachment: fixed;
  color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh;
}

/* Nav */
nav { position:sticky;top:0;z-index:100;background:rgba(8,8,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between; }
.nav-logo { display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none; }
.nav-logo span { font-size:17px;font-weight:700;background:linear-gradient(135deg,#00c9a7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.nav-logo img { width:32px;height:32px;object-fit:contain; }
.nav-right { display:flex;align-items:center;gap:16px; }
.nav-right a { color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s; }
.nav-right a:hover { color:var(--teal); }
.back-btn { display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;font-weight:500;transition:color .2s; }
.back-btn:hover { color:var(--teal); }

/* Map view */
#map-view { display:block; }
.map-header { text-align:center;padding:48px 20px 24px; }
.map-header h1 { font-size:36px;font-weight:800;margin-bottom:8px; }
.map-header p { color:var(--muted);font-size:16px; }
.legend { display:flex;gap:24px;justify-content:center;margin:16px 0 8px;flex-wrap:wrap; }
.legend-item { display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted); }
.legend-dot { width:14px;height:14px;border-radius:3px; }

#world-map { width:100%;max-width:100%;margin:0 auto;display:block;padding:0 16px; }

.country-path { cursor:pointer;transition:opacity .15s; }
.country-path:hover { opacity:0.75; }
.country-path.geoguessr { fill:#00c9a7; }
.country-path.no-coverage { fill:#1e1e38;cursor:default; }
.country-path.geoguessr:hover { fill:#00e6bf; }

.map-tooltip {
  position:fixed;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:13px;font-weight:600;
  pointer-events:none;z-index:200;display:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
}
.map-tooltip .tt-flag { font-size:18px;margin-right:6px; }
.map-tooltip .tt-hint { color:var(--teal);font-size:11px;font-weight:400;margin-top:2px; }
.map-tooltip .tt-nope { color:var(--muted);font-size:11px;font-weight:400;margin-top:2px; }

/* Country grid (below map) */
.country-grid { max-width:100%;margin:24px auto 64px;padding:0 16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px; }
.country-card { background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text); }
.country-card:hover { border-color:var(--teal);background:rgba(0,201,167,0.06);transform:translateY(-1px); }
.country-card .flag { font-size:20px;line-height:1; }
.country-card .name { font-size:13px;font-weight:600; }

/* Country page */
#country-view { display:none; }
.country-hero { padding:64px 20px 40px;max-width:860px;margin:0 auto;text-align:center; }
.country-flag-big { font-size:64px;margin-bottom:16px;line-height:1;filter:drop-shadow(0 0 28px rgba(0,201,167,0.35)); }
.country-hero h1 { font-size:44px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,#f0f0ff,#c9c9e8);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
.country-hero .sub { color:var(--muted);font-size:16px;position:relative;display:inline-block;padding-bottom:20px; }
.country-hero .sub::after { content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:64px;height:3px;border-radius:2px;background:linear-gradient(90deg,#00c9a7,#7c3aed); }
.guide-body { max-width:1000px;margin:0 auto;padding:0 24px 80px; }
.guide-section { background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:16px;padding:28px;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.03);position:relative; }
.guide-section h2 { font-size:16px;font-weight:700;color:var(--teal);margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px; }
.guide-section p, .guide-section li { color:#c0c0d8;line-height:1.7;font-size:15px; }
.guide-section ul { padding-left:18px; }
.guide-section li { margin-bottom:8px; }
.clue-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px; }
.clue-card { background:linear-gradient(160deg,rgba(255,255,255,0.04),rgba(255,255,255,0.01));border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:0 4px 14px rgba(0,0,0,0.22);transition:transform .2s,border-color .2s; }
.clue-card:hover { transform:translateY(-2px);border-color:rgba(0,201,167,0.35); }
.clue-card .clue-icon { font-size:22px;margin-bottom:6px;filter:drop-shadow(0 0 10px rgba(0,201,167,0.25)); }
.clue-card .clue-title { font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px; }
.clue-card .clue-text { font-size:12px;color:var(--muted);line-height:1.5; }
.confuse-item { background:linear-gradient(160deg,rgba(255,107,107,0.07),rgba(255,107,107,0.02));border-left:3px solid var(--red);border-radius:0 8px 8px 0;padding:12px 14px;margin-bottom:8px;box-shadow:0 4px 14px rgba(0,0,0,0.2); }
.confuse-item .confuse-country { font-weight:700;margin-bottom:4px;font-size:14px; }
.confuse-item .confuse-diff { font-size:13px;color:#c0c0d8; }
.loading-pulse { text-align:center;padding:80px 20px;color:var(--muted); }
.loading-pulse .spinner { width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }

.enlargeable-photo { position:relative;cursor:pointer; }
.enlargeable-photo .expand-icon {
  position:absolute;top:10px;right:10px;width:34px;height:34px;
  background:rgba(0,0,0,0.55);border-radius:8px;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s, background .15s;pointer-events:none;
}
.enlargeable-photo:hover .expand-icon { opacity:1; }
.enlargeable-photo:hover .expand-icon { background:rgba(0,0,0,0.75); }
</style>
</head>
<body>

});

const isoToCountry = {};

// Convert ISO alpha-2 to twemoji SVG URL — same method as the homepage,
// works on Windows where emoji flag rendering is broken in most browsers.
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// Lightweight markdown-style formatting: **bold** and *italic*. escapeHtml
// runs first so any raw HTML in stored text is neutralized, then only our
// own <strong>/<em> tags get added on top.
function mdToHtml(s) {
  let h = escapeHtml(s || '');
  h = h.replace(/\*\*([^*]+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\*([^*]+?)\*/g, '<em>$1</em>');
  return h;
}

function flagUrl(iso) {
  const base = 0x1F1E6 - 65; // 'A' is char code 65, regional indicator A is 0x1F1E6
  const cp1 = (iso.charCodeAt(0) + base).toString(16);
  const cp2 = (iso.charCodeAt(1) + base).toString(16);
  return `https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/${cp1}-${cp2}.svg`;
}

function flagImg(iso, size=20) {
  return `<img src="${flagUrl(iso)}" width="${size}" height="${Math.round(size*0.75)}" style="border-radius:2px;vertical-align:middle;flex-shrink:0;" onerror="this.style.display='none'" alt="${iso}">`;
}

// Index space: [0 .. countryFeatures.length) for real map polygons,
// then SMALL_DOTS, then US_REGIONS — so every clickable thing (real
// country shapes, tiny territory dots, and the Alaska/Hawaii overlay
// circles) shares one consistent id-color lookup.
let countryFeatures = [];
const SMALL_DOTS = [
  {iso:'FO', slug:'faroe-islands',            name:'Faroe Islands',           lat:62.0,  lng:-6.9},
  {iso:'JE', slug:'jersey',                   name:'Jersey',                  lat:49.2,  lng:-2.1},

const US_REGIONS = [

  {slug:'hawaii', name:'Hawaii', lat:20.8, lng:-157.0},
];
// Built once features load: [{type:'country', feature, iso, c}, {type:'dot', t}, {type:'us', t}, ...]
let globeClickables = [];

function globeIdColorFor(index){
  const n = index + 1;
  return `rgb(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255})`;
}
function globeIndexFromIdColor(r, g, b){
  const n = (r << 16) | (g << 8) | b;
  return n === 0 ? -1 : n - 1;
}
function globePaintOcean(ctx){
  ctx.fillStyle = '#0c1219';
  ctx.fillRect(0, 0, GLOBE_TEX_W, GLOBE_TEX_H);
}
function globePaintDot(ctx, lng, lat, color, radiusPx){
  const p = projection([lng, lat]);
  if (!p) return;
  ctx.beginPath();
  ctx.arc(p[0], p[1], radiusPx, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function buildGlobeTextures(world){
  countryFeatures = topojson.feature(world, world.objects.countries).features;
  globeClickables = [];
  globePaintOcean(globeVisibleCtx);

  countryFeatures.forEach(feature => {
    const iso = numToISO[+feature.id];
    const covered = iso && GEOGUESSR_COUNTRIES.has(iso);
    const idx = globeClickables.length;
    globeClickables.push({ type:'country', feature, iso, covered });

    globeVisibleCtx.beginPath();
    globePathVisible.context(globeVisibleCtx)(feature);
    globeVisibleCtx.fillStyle = covered ? 'rgba(0,201,167,0.85)' : '#1e1e38';
    globeVisibleCtx.fill();
    globeVisibleCtx.lineWidth = 0.6;
    globeVisibleCtx.strokeStyle = '#0d2b28';
    globeVisibleCtx.stroke();

    globeIdCtx.beginPath();
    globePathVisible.context(globeIdCtx)(feature);
    globeIdCtx.fillStyle = globeIdColorFor(idx);
    globeIdCtx.fill();
  });

  SMALL_DOTS.forEach(t => {
    const idx = globeClickables.length;
    globeClickables.push({ type:'dot', t });
    globePaintDot(globeVisibleCtx, t.lng, t.lat, '#a78bfa', 3.2);
    globePaintDot(globeIdCtx, t.lng, t.lat, globeIdColorFor(idx), 5); // slightly larger hit target than visible dot
  });

  US_REGIONS.forEach(t => {
    const idx = globeClickables.length;
    globeClickables.push({ type:'us', t });
    globePaintDot(globeIdCtx, t.lng, t.lat, globeIdColorFor(idx), 14); // invisible on the visible canvas — id-only hit target
  });

  globeTexture.needsUpdate = true;
}

const globeCanvasEl = document.getElementById('globeCanvas');
const globeScene = new THREE.Scene();
const globeCamera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
let globeCamDist = 3;
globeCamera.position.set(0, 0, globeCamDist);

const globeRenderer = new THREE.WebGLRenderer({ canvas: globeCanvasEl, antialias: true, alpha: true });
globeRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

function resizeGlobeRenderer(){
  const wrap = globeCanvasEl.parentElement;
  const w = wrap.clientWidth, h = wrap.clientHeight;
  if (!w || !h) return;
  globeRenderer.setSize(w, h, false);
  globeCamera.aspect = w / h;
  globeCamera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeGlobeRenderer);

globeScene.add(new THREE.AmbientLight(0x8888aa, 1.1));
const globeSun = new THREE.DirectionalLight(0xffffff, 1.1);
globeSun.position.set(4, 2, 3);
globeScene.add(globeSun);

const globeGroup = new THREE.Group();
globeScene.add(globeGroup);

const globeTexture = new THREE.CanvasTexture(globeVisibleCanvas);
globeTexture.minFilter = THREE.LinearFilter;
const globeMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1, 96, 96),
  new THREE.MeshPhongMaterial({ map: globeTexture, shininess: 6 })
);
globeGroup.add(globeMesh);

const globeAtmosphere = new THREE.Mesh(
  new THREE.SphereGeometry(1.03, 64, 64),
  new THREE.MeshBasicMaterial({ color: 0x00c9a7, transparent: true, opacity: 0.06, side: THREE.BackSide })
);
globeGroup.add(globeAtmosphere);

let globeDragging = false, globeLastX = 0, globeLastY = 0, globeIdleTimer = null, globeAutoRotate = true;
const GLOBE_ROT_SPEED = 0.005;
function globePauseAutoRotate(){
  globeAutoRotate = false;
  clearTimeout(globeIdleTimer);
  globeIdleTimer = setTimeout(() => { globeAutoRotate = true; }, 2500);
}
function globePointerDown(x, y){
  globeDragging = true; globeLastX = x; globeLastY = y;
  globeCanvasEl.style.cursor = 'grabbing';
  globePauseAutoRotate();
}
function globePointerMove(x, y){
  if (!globeDragging) return;
  const dx = x - globeLastX, dy = y - globeLastY;
  globeGroup.rotation.y += dx * GLOBE_ROT_SPEED;
  globeGroup.rotation.x = Math.max(-1.4, Math.min(1.4, globeGroup.rotation.x + dy * GLOBE_ROT_SPEED));
  globeLastX = x; globeLastY = y;
}
function globePointerUp(){
  globeDragging = false;
  globeCanvasEl.style.cursor = 'grab';
  globePauseAutoRotate();
}
globeCanvasEl.addEventListener('mousedown', e => globePointerDown(e.clientX, e.clientY));
window.addEventListener('mousemove', e => globePointerMove(e.clientX, e.clientY));
window.addEventListener('mouseup', globePointerUp);
globeCanvasEl.addEventListener('touchstart', e => { const t = e.touches[0]; globePointerDown(t.clientX, t.clientY); }, { passive: true });
globeCanvasEl.addEventListener('touchmove', e => { const t = e.touches[0]; globePointerMove(t.clientX, t.clientY); }, { passive: true });
globeCanvasEl.addEventListener('touchend', globePointerUp);

const GLOBE_ZOOM_MIN = 1.4, GLOBE_ZOOM_MAX = 6;
function setGlobeZoom(dist){
  globeCamDist = Math.max(GLOBE_ZOOM_MIN, Math.min(GLOBE_ZOOM_MAX, dist));
  globeCamera.position.z = globeCamDist;
}
globeCanvasEl.addEventListener('wheel', e => {
  e.preventDefault();
  setGlobeZoom(globeCamDist + e.deltaY * 0.0025);
}, { passive: false });
document.getElementById('zoom-in').addEventListener('click', () => setGlobeZoom(globeCamDist - 0.5));
document.getElementById('zoom-out').addEventListener('click', () => setGlobeZoom(globeCamDist + 0.5));
document.getElementById('zoom-reset').addEventListener('click', () => setGlobeZoom(3));

const globeRaycaster = new THREE.Raycaster();
const globeMouseNDC = new THREE.Vector2();
function globeRaycastAt(clientX, clientY){
  const rect = globeCanvasEl.getBoundingClientRect();
  globeMouseNDC.x = ((clientX - rect.left) / rect.width) * 2 - 1;
  globeMouseNDC.y = -((clientY - rect.top) / rect.height) * 2 + 1;
  globeRaycaster.setFromCamera(globeMouseNDC, globeCamera);
  const hits = globeRaycaster.intersectObject(globeMesh);
  return hits.length ? hits[0] : null;
}
function globeClickableAt(uv){
  const px = Math.floor(uv.x * GLOBE_TEX_W);
  const py = Math.floor((1 - uv.y) * GLOBE_TEX_H);
  const data = globeIdCtx.getImageData(Math.max(0, Math.min(GLOBE_TEX_W - 1, px)), Math.max(0, Math.min(GLOBE_TEX_H - 1, py)), 1, 1).data;
  const idx = globeIndexFromIdColor(data[0], data[1], data[2]);
  return idx >= 0 ? globeClickables[idx] : null;
}

globeCanvasEl.addEventListener('mousemove', e => {
  if (globeDragging) return;
  const hit = globeRaycastAt(e.clientX, e.clientY);
  if (!hit){ tooltip.style.display = 'none'; globeCanvasEl.style.cursor = 'grab'; return; }
  const click = globeClickableAt(hit.uv);

  let iso = null, name = null, isClickable = false;
  if (click?.type === 'country'){ iso = click.iso; name = iso && isoToCountry[iso]?.name; isClickable = click.covered; }
  else if (click?.type === 'dot'){ iso = click.t.iso; name = click.t.name; isClickable = true; }
  else if (click?.type === 'us'){ iso = 'US'; name = click.t.name; isClickable = true; }

  if (!name){ tooltip.style.display = 'none'; globeCanvasEl.style.cursor = 'grab'; return; }
  tooltip.style.display = 'block';
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top  = (e.clientY - 44) + 'px';
  document.getElementById('tt-flag').innerHTML = flagImg(iso, 20);
  document.getElementById('tt-name').textContent = name;
  document.getElementById('tt-hint').innerHTML = isClickable
    ? '<span class="tt-hint">Click for GeoGuessr guide →</span>'
    : '<span class="tt-nope">No GeoGuessr coverage</span>';
  globeCanvasEl.style.cursor = isClickable ? 'pointer' : 'grab';
});
globeCanvasEl.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

let globeDownX = 0, globeDownY = 0;
globeCanvasEl.addEventListener('mousedown', e => { globeDownX = e.clientX; globeDownY = e.clientY; });
globeCanvasEl.addEventListener('mouseup', e => {
  if (Math.abs(e.clientX - globeDownX) > 4 || Math.abs(e.clientY - globeDownY) > 4) return; // was a drag, not a click
  const hit = globeRaycastAt(e.clientX, e.clientY);
  if (!hit) return;
  const click = globeClickableAt(hit.uv);
  if (!click) return;

  if (click.type === 'country' && click.covered){
    navigateTo(isoToCountry[click.iso].slug);
  } else if (click.type === 'dot'){
    navigateTo(click.t.slug);
  } else if (click.type === 'us'){
    navigateTo(click.t.slug);
  }
});

let globeIsVisible = true;
function animateGlobe(){
  requestAnimationFrame(animateGlobe);
  if (globeAutoRotate && !globeDragging) globeGroup.rotation.y += 0.0009;
  if (globeIsVisible) globeRenderer.render(globeScene, globeCamera);
}

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(r => r.json())
  .then(world => {
    buildGlobeTextures(world);
    resizeGlobeRenderer();
    animateGlobe();
  })
  .catch(err => {
    console.error('Globe failed to load:', err);
    const wrap = globeCanvasEl.parentElement;
    wrap.innerHTML = '<div style="color:var(--muted);text-align:center;padding:60px 20px;">Could not load the map right now — try refreshing the page.</div>';
  });

});
SMALL_DOTS.forEach(t => searchableEntries.push({ name: t.name, slug: t.slug, iso: t.iso }));
US_REGIONS.forEach(t => searchableEntries.push({ name: t.name, slug: t.slug, iso: 'US' }));
searchableEntries.sort((a, b) => a.name.localeCompare(b.name));

const searchInput = document.getElementById('countrySearchInput');
const searchResults = document.getElementById('countrySearchResults');

function renderSearchResults(query){
  const q = query.trim().toLowerCase();
  if (!q){ searchResults.style.display = 'none'; return; }
  const matches = searchableEntries.filter(e => e.name.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length){
    searchResults.innerHTML = '<div style="padding:12px 16px;color:var(--muted);font-size:13px;">No matches</div>';
    searchResults.style.display = 'block';
    return;
  }
  searchResults.innerHTML = matches.map(e => `
    <div class="search-result-item" data-slug="${e.slug}" style="display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:14px;"
      onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background='none'">
      ${flagImg(e.iso, 18)}<span>${escapeHtml(e.name)}</span>
    </div>`).join('');
  searchResults.style.display = 'block';
  searchResults.querySelectorAll('.search-result-item').forEach(el => {
    el.addEventListener('click', () => {
      searchInput.value = '';
      searchResults.style.display = 'none';
      navigateTo(el.dataset.slug);
    });
  });
}
searchInput.addEventListener('input', () => renderSearchResults(searchInput.value));
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){
    const first = searchResults.querySelector('.search-result-item');
    if (first) first.click();
  } else if (e.key === 'Escape'){
    searchResults.style.display = 'none';
    searchInput.blur();
  }
});
document.addEventListener('click', (e) => {
  if (!e.target.closest('#countrySearchInput') && !e.target.closest('#countrySearchResults')){
    searchResults.style.display = 'none';
  }
});

// Navigation
function navigateTo(slug) {
  const c = slugToCountry[slug];
  if (!c) return;
  history.pushState({slug}, '', `/metas/${slug}`);
  showCountry(c);
}

function showMap() {
  document.getElementById('map-view').style.display = 'block';
  document.getElementById('country-view').style.display = 'none';
  document.getElementById('nav-report-btn').style.display = 'none';
  history.pushState({}, '', '/metas');
  globeIsVisible = true;
  resizeGlobeRenderer();
}

let currentCountryName = null;

async function showCountry(c) {
  document.getElementById('map-view').style.display = 'none';
  globeIsVisible = false;
  currentCountryName = c.name;
  document.getElementById('nav-report-btn').style.display = 'inline-block';
  const cv = document.getElementById('country-view');
  cv.style.display = 'block';
  document.getElementById('cv-flag').innerHTML = flagImg(c.iso, 72);
  document.getElementById('cv-name').textContent = c.name;
  document.getElementById('cv-sub').textContent = 'GeoGuessr Country Meta Guide';
  document.getElementById('cv-body').innerHTML = `<div class="loading-pulse"><div class="spinner"></div><div>Loading ${c.name} guide...</div></div>`;
  window.scrollTo(0,0);

  // Retry up to 3 times — Render free tier can take 30-50s to wake from sleep
  for (let attempt = 1; attempt <= 3; attempt++) {
    try {
      document.getElementById('cv-body').innerHTML = `<div class="loading-pulse"><div class="spinner"></div><div>${attempt > 1 ? `Waking server... attempt ${attempt}/3` : `Loading ${c.name} guide...`}</div></div>`;
      const res = await fetch(`${API}/ai/country_meta`, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({country: c.name, iso: c.iso}),
        signal: AbortSignal.timeout(55000)
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      renderGuide(c, data);
      return;
    } catch(e) {
      if (attempt === 3) {
        document.getElementById('cv-body').innerHTML = `
          <div class="loading-pulse" style="color:#ff6b6b">
            <div style="font-size:32px;margin-bottom:12px">⚠️</div>
            <div style="font-weight:700;margin-bottom:8px">Could not connect to server</div>
            <div style="font-size:13px;color:var(--muted);margin-bottom:20px">The server may be starting up. Please wait a moment and try again.</div>
            <button onclick="showCountry(slugToCountry['${c.slug}'])" style="background:#00c9a7;border:none;color:#080810;font-weight:700;padding:10px 24px;border-radius:8px;cursor:pointer;">Try Again</button>
          </div>`;
      }
    }
  }
}

function renderGuide(c, data) {
  // Block-based manual guide
  if (data.blocks && data.blocks.length) {
    const html = data.blocks.map((block, blockIdx, blockArr) => {
      const prevAttach = blockIdx > 0 && blockArr[blockIdx-1].data && blockArr[blockIdx-1].data.attachBelow;
      const nextAttach = block.data && block.data.attachBelow && blockIdx < blockArr.length - 1;
      switch(block.type) {
        case 'divider':
          return `<hr style="border:none;border-top:1px solid var(--border);margin:24px 0;">`;
        case 'spacer':
          return `<div style="height:${block.data.height||32}px;"></div>`;
        case 'heading':
          const anchor = (block.data.text||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
          return `<h2 id="${anchor}" style="font-size:20px;font-weight:800;margin:40px 0 16px;color:#e0e0f0;display:flex;align-items:center;gap:10px;">
            <span style="width:4px;height:22px;background:linear-gradient(180deg,#00c9a7,#7c3aed);border-radius:2px;display:inline-block;flex-shrink:0;"></span>
            ${block.data.text||''}
          </h2>`;
        case 'text':
          return `<p style="color:#c0c0d8;line-height:1.8;font-size:15px;margin-bottom:16px;white-space:pre-wrap;">${mdToHtml(block.data.text||'')}</p>`;
        case 'image':
          return `<div style="margin:20px 0;">${block.data.src ? `<div class="enlargeable-photo" onclick="openLightbox('${block.data.src}')"><img src="${block.data.src}" style="width:100%;border-radius:12px;display:block;"><div class="expand-icon">${EXPAND_ICON}</div></div>` : ''}${block.data.caption ? `<div style="text-align:center;font-size:13px;color:var(--muted);margin-top:8px;">${block.data.caption}</div>` : ''}</div>`;
        case 'tip': {
          const rTR = prevAttach ? '0' : '12px', rBR = nextAttach ? '0' : '12px';
          const mt = prevAttach ? '0' : '16px', mb = nextAttach ? '0' : '16px';
          return `<div style="background:rgba(0,201,167,0.08);border-left:4px solid #00c9a7;border-radius:0 ${rTR} ${rBR} 0;padding:16px 20px;margin:${mt} 0 ${mb};"><div style="font-size:12px;font-weight:700;color:#00c9a7;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">💡 Tip</div><p style="color:#c0c0d8;line-height:1.7;font-size:15px;margin:0;white-space:pre-wrap;">${mdToHtml(block.data.text||'')}</p></div>`;
        }
        case 'warning': {
          const rTR = prevAttach ? '0' : '12px', rBR = nextAttach ? '0' : '12px';
          const mt = prevAttach ? '0' : '16px', mb = nextAttach ? '0' : '16px';
          return `<div style="background:rgba(255,107,107,0.08);border-left:4px solid #ff6b6b;border-radius:0 ${rTR} ${rBR} 0;padding:16px 20px;margin:${mt} 0 ${mb};"><div style="font-size:12px;font-weight:700;color:#ff6b6b;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;">⚠️ Easy to Confuse With</div><p style="color:#c0c0d8;line-height:1.7;font-size:15px;margin:0;white-space:pre-wrap;">${mdToHtml(block.data.text||'')}</p></div>`;
        }
        case 'img-text': {
          const itWidth = block.data.imgWidth || '55';
          const itMap = block.data.mapSrc && block.data.mapSrc !== '__uploading__' ? block.data.mapSrc : null;
          const itMapSize = block.data.mapBadgeSize || '110';
          const rT = prevAttach ? '0' : '14px', rB = nextAttach ? '0' : '14px';
          const mt = prevAttach ? '0' : '20px', mb = nextAttach ? '0' : '20px';
          return `<div style="display:grid;grid-template-columns:${itWidth==='100'?'1fr':itWidth+'% 1fr'};gap:24px;align-items:start;margin:${mt} 0 ${mb};background:linear-gradient(160deg,var(--card2),var(--card));border:1px solid var(--border);border-radius:${rT} ${rT} ${rB} ${rB};padding:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.03);">
            <div>
              <div class="${block.data.src ? 'enlargeable-photo' : ''}" ${block.data.src ? `onclick="openLightbox('${block.data.src}')"` : ''} style="position:relative;">
                ${block.data.src ? `<img src="${block.data.src}" style="width:100%;height:auto;display:block;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.4);"><div class="expand-icon">${EXPAND_ICON}</div>` : ''}
              </div>
              ${block.data.caption ? `<div style="text-align:center;font-size:12px;color:var(--muted);margin-top:8px;font-style:italic;">${block.data.caption}</div>` : ''}
            </div>
            <div>
              <p style="color:#c0c0d8;line-height:1.85;font-size:15px;margin:0 0 14px;white-space:pre-wrap;">${mdToHtml(block.data.text||'')}</p>
              ${itMap ? `<img src="${itMap}" style="width:${itMapSize}px;max-width:100%;display:block;border-radius:6px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.4));">` : ''}
            </div>
          </div>`;
        }
        case 'two-col': {
          const rT = prevAttach ? '0' : '12px', rB = nextAttach ? '0' : '12px';
          const mt = prevAttach ? '0' : '16px', mb = nextAttach ? '0' : '16px';
          return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:${mt} 0 ${mb};"><div style="background:var(--card);border:1px solid var(--border);border-radius:${rT} ${rT} ${rB} ${rB};padding:18px;"><p style="color:#c0c0d8;line-height:1.7;font-size:15px;margin:0;white-space:pre-wrap;">${mdToHtml(block.data.left||'')}</p></div><div style="background:var(--card);border:1px solid var(--border);border-radius:${rT} ${rT} ${rB} ${rB};padding:18px;"><p style="color:#c0c0d8;line-height:1.7;font-size:15px;margin:0;white-space:pre-wrap;">${mdToHtml(block.data.right||'')}</p></div></div>`;
        }
        case 'links':
          const litems = (block.data.items || []).filter(x => x.label);
          if (!litems.length) return '';
          return `<ul style="padding-left:0;list-style:none;margin:12px 0 20px;">
            ${litems.map(item => `
              <li style="display:flex;gap:10px;align-items:baseline;margin-bottom:12px;font-size:15px;color:#c0c0d8;">
                <span style="color:#00c9a7;flex-shrink:0;font-size:18px;">•</span>
                <span>
                  ${item.url
                    ? `<a href="${item.url}" target="_blank" rel="noopener" style="color:#e0e0f0;font-weight:700;text-decoration:none;" onmouseover="this.style.color='#00c9a7'" onmouseout="this.style.color='#e0e0f0'">${item.label}</a>`
                    : `<strong style="color:#e0e0f0;">${item.label}</strong>`}
                  ${item.url ? ` <a href="${item.url}" target="_blank" rel="noopener" style="color:#7c3aed;font-size:12px;text-decoration:underline;">link ↗</a>` : ''}
                  ${item.desc ? ` <span style="color:#8888aa;">— ${item.desc}</span>` : ''}
                </span>
              </li>`).join('')}
          </ul>`;
        case 'region-tabs':
          const rtBtns = (block.data.buttons || []).filter(x => x && x.trim());
          if (!rtBtns.length) return '';
          return `<div style="display:flex;flex-wrap:wrap;gap:8px;margin:24px 0;padding:18px 20px;background:rgba(124,58,237,0.06);border:1px solid rgba(124,58,237,0.2);border-radius:14px;">
            <div style="font-size:11px;color:#7c3aed;font-weight:700;text-transform:uppercase;letter-spacing:.6px;width:100%;margin-bottom:8px;">📍 Jump to Region</div>
            ${rtBtns.map(label => {
              const a = label.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
              return `<button onclick="document.getElementById('${a}')?.scrollIntoView({behavior:'smooth'})" style="background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.3);color:#a78bfa;padding:9px 18px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;" onmouseover="this.style.background='rgba(124,58,237,0.22)';this.style.color='#c4a0ff'" onmouseout="this.style.background='rgba(124,58,237,0.1)';this.style.color='#a78bfa'">${label}</button>`;
            }).join('')}
          </div>`;
        case 'nav':
          const navBtns = (block.data.buttons || []).filter(x => x && x.trim());
          if (!navBtns.length) return '';
          const btns = navBtns.map((label, i) => {
            const a = label.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
            return `<button onclick="document.getElementById('${a}')?.scrollIntoView({behavior:'smooth'})" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#c0c0d8;padding:13px 28px;border-radius:30px;cursor:pointer;font-size:15px;font-weight:700;transition:all .2s;letter-spacing:.3px;backdrop-filter:blur(4px);" onmouseover="this.style.background='rgba(0,201,167,0.15)';this.style.borderColor='rgba(0,201,167,0.4)';this.style.color='#00c9a7'" onmouseout="this.style.background='rgba(255,255,255,0.05)';this.style.borderColor='rgba(255,255,255,0.1)';this.style.color='#c0c0d8'">${label}</button>`;
          }).join('');
          return `<div style="display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 32px;">${btns}</div>`;
        default:
          return '';
      }
    }).join('');

    document.getElementById('cv-body').innerHTML = `
      <div style="max-width:100%;">${html}</div>
      <div style="text-align:center;margin-top:48px;">
        <button onclick="showMap()" style="background:var(--card);border:1px solid var(--border);color:var(--muted);padding:12px 24px;border-radius:10px;cursor:pointer;font-size:14px;transition:all .2s;" onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">← Back to World Map</button>
      </div>`;
    return;
  }

  // Fallback: AI-generated structured guide
  const clues = (data.visual_clues || []).map(cl => `
    <div class="clue-card">
      <div class="clue-icon">${cl.icon || '📍'}</div>
      <div class="clue-title">${cl.title}</div>
      <div class="clue-text">${cl.detail}</div>
    </div>`).join('');

  const confuse = (data.easy_to_confuse || []).map(x => `
    <div class="confuse-item">
      <div class="confuse-country">${x.country}</div>
      <div class="confuse-diff">${x.difference}</div>
    </div>`).join('');

  document.getElementById('cv-body').innerHTML = `
    <div class="guide-section">
      <h2>🔑 Dead Giveaway</h2>
      <p style="font-size:17px;font-weight:600;color:#00c9a7;">${data.dead_giveaway || ''}</p>
    </div>
    <div class="guide-section">
      <h2>👁️ Key Visual Clues</h2>
      <div class="clue-grid">${clues}</div>
    </div>
    ${data.landscape ? `<div class="guide-section"><h2>🌍 Landscape & Terrain</h2><p>${data.landscape}</p></div>` : ''}
    ${data.road_meta ? `<div class="guide-section"><h2>🛣️ Road Meta</h2><p>${data.road_meta}</p></div>` : ''}
    ${data.language_signs ? `<div class="guide-section"><h2>🔤 Language & Signs</h2><p>${data.language_signs}</p></div>` : ''}
    ${data.vehicles ? `<div class="guide-section"><h2>🚗 Vehicles & Infrastructure</h2><p>${data.vehicles}</p></div>` : ''}
    ${confuse ? `<div class="guide-section"><h2>⚠️ Easy to Confuse With</h2>${confuse}</div>` : ''}
    ${data.pro_tips ? `<div class="guide-section"><h2>⚡ Pro Tips</h2><p>${data.pro_tips}</p></div>` : ''}
    <div style="text-align:center;margin-top:32px;">
      <button onclick="showMap()" style="background:var(--card);border:1px solid var(--border);color:var(--muted);padding:12px 24px;border-radius:10px;cursor:pointer;font-size:14px;transition:all .2s;" onmouseover="this.style.borderColor='var(--teal)';this.style.color='var(--teal)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">← Back to World Map</button>
    </div>`;
}

// Handle browser back/forward
window.addEventListener('popstate', () => {
  const path = window.location.pathname;
  const match = path.match(/^\/metas\/(.+)$/);
  if (match) {
    const c = slugToCountry[match[1]];
    if (c) { showCountry(c); return; }
  }
  document.getElementById('map-view').style.display = 'block';
  document.getElementById('country-view').style.display = 'none';
  globeIsVisible = true;
  resizeGlobeRenderer();
});

// Load directly to country page if URL has a slug (path OR ?c= query param from 404 redirect)
window.addEventListener('DOMContentLoaded', () => {
  const path = window.location.pathname;
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('c') || (path.match(/^\/metas\/(.+)$/) || [])[1];
  if (slug) {
    const c = slugToCountry[slug];
    if (c) {
      // Clean up the URL to look like /metas/country
      history.replaceState({slug}, '', `/metas/${slug}`);
      showCountry(c);
    }
  }
});

function openLightbox(src){
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeLightbox(){
  document.getElementById('lightbox-overlay').style.display = 'none';
  document.body.style.overflow = '';
}

let currentReportCountry = null;

function openReportModal(countryName){
  currentReportCountry = countryName;
  document.getElementById('report-modal-country').textContent = `Guide: ${countryName}`;
  document.getElementById('report-modal-text').value = '';
  document.getElementById('report-modal-error').style.display = 'none';
  const btn = document.getElementById('report-modal-submit');
  btn.disabled = false;
  btn.textContent = 'Submit Report';
  document.getElementById('report-modal-overlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}
function closeReportModal(){
  document.getElementById('report-modal-overlay').style.display = 'none';
  document.body.style.overflow = '';
}
async function submitMetaReport(){
  const desc = document.getElementById('report-modal-text').value.trim();
  const errEl = document.getElementById('report-modal-error');
  if(!desc){
    errEl.textContent = 'Please describe the issue.';
    errEl.style.display = 'block';
    return;
  }
  const btn = document.getElementById('report-modal-submit');
  btn.disabled = true;
  btn.textContent = 'Submitting…';
  errEl.style.display = 'none';
  try {
    // Optional — same localStorage key index.html stores the auth token
    // under. Anonymous submissions are fine too; the backend just won't
    // attach a user to those (and they won't be able to track it under
    // My Tickets, since there's no account to tie it to).
    const token = localStorage.getItem('gax_token') || '';
    const res = await fetch(`${API}/tickets/create`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        category: 'meta',
        subject: `Meta issue: ${currentReportCountry}`,
        message: desc,
        token,
      })
    });
    const data = await res.json();
    if(!res.ok || data.error) throw new Error(data.error || 'Something went wrong');
    btn.textContent = 'Submitted ✓';
    setTimeout(() => { closeReportModal(); }, 900);
  } catch(e){
    errEl.textContent = e.message || 'Could not submit report. Please try again.';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Submit Report';
  }
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeLightbox(); closeReportModal(); }
});
</script>

  <img id="lightbox-img" src="" style="max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 20px 60px rgba(0,0,0,0.6);cursor:default;" onclick="event.stopPropagation()">
  <button onclick="closeLightbox()" style="position:absolute;top:20px;right:28px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;width:40px;height:40px;border-radius:50%;font-size:20px;cursor:pointer;line-height:1;">✕</button>
</div>

  <div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:440px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <div style="font-size:18px;font-weight:800;color:#e0e0f0;margin-bottom:6px;">⚠️ Report a Meta Issue</div>

    <div id="report-modal-error" style="display:none;color:#ff6b6b;font-size:13px;margin-top:8px;"></div>

      <button id="report-modal-submit" onclick="submitMetaReport()" style="background:#00c9a7;border:none;color:#080810;font-weight:700;padding:10px 24px;border-radius:8px;cursor:pointer;font-size:14px;">Submit Report</button>
    </div>
  </div>
