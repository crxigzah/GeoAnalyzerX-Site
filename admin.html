<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoAnalyzerX Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08080f; color: #e0e0f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  
  #login-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .login-box { background:#12121e; border:1px solid #1e1e2e; border-radius:16px; padding:40px; width:340px; text-align:center; }
  .login-box h1 { font-size:22px; font-weight:800; margin-bottom:6px; }
  .login-box p { color:#8888aa; font-size:13px; margin-bottom:24px; }
  .login-box input { width:100%; padding:12px; background:#1a1a2e; border:1px solid #2a2a3e; border-radius:8px; color:#e0e0f0; font-size:14px; margin-bottom:12px; outline:none; }
  .login-box input:focus { border-color:#00c9a7; }
  .btn { padding:12px 20px; border:none; border-radius:8px; cursor:pointer; font-size:13px; font-weight:700; transition:opacity .2s; }
  .btn:hover { opacity:.85; }
  .btn-primary { background:linear-gradient(135deg,#00c9a7,#00a87d); color:#000; width:100%; }
  .btn-danger  { background:rgba(255,100,100,.15); color:#ff6b6b; border:1px solid rgba(255,100,100,.3); }
  .btn-purple  { background:linear-gradient(135deg,#7c3aed,#5b21b6); color:#fff; }
  .btn-sm { padding:5px 12px; font-size:11px; }

  #dashboard { display:none; }
  nav { background:#12121e; border-bottom:1px solid #1e1e2e; padding:0 32px; display:flex; align-items:center; justify-content:space-between; height:56px; }
  nav h1 { font-size:16px; font-weight:800; background:linear-gradient(135deg,#00c9a7,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  nav .nav-right { display:flex; align-items:center; gap:12px; font-size:12px; color:#8888aa; }

  .page { padding:32px; max-width:1200px; margin:0 auto; }
  
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:32px; }
  .stat-card { background:#12121e; border:1px solid #1e1e2e; border-radius:12px; padding:20px; }
  .stat-card .num { font-size:32px; font-weight:800; background:linear-gradient(135deg,#00c9a7,#7c3aed); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .stat-card .label { font-size:12px; color:#8888aa; margin-top:4px; }

  .card { background:#12121e; border:1px solid #1e1e2e; border-radius:12px; overflow:hidden; margin-bottom:24px; }
  .card-header { padding:16px 20px; border-bottom:1px solid #1e1e2e; display:flex; align-items:center; justify-content:space-between; }
  .card-header h2 { font-size:14px; font-weight:700; }
  .card-header span { font-size:12px; color:#8888aa; }

  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; padding:10px 16px; color:#8888aa; font-size:11px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; border-bottom:1px solid #1e1e2e; }
  td { padding:12px 16px; border-bottom:1px solid #0d0d18; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:rgba(255,255,255,.02); }

  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:700; }
  .badge-pro  { background:rgba(240,165,0,.15); color:#f0a500; border:1px solid rgba(240,165,0,.3); }
  .badge-free { background:rgba(0,201,167,.1); color:#00c9a7; border:1px solid rgba(0,201,167,.2); }
  .badge-banned { background:rgba(255,100,100,.15); color:#ff6b6b; border:1px solid rgba(255,100,100,.3); }

  .ban-menu { position:relative; display:inline-block; }
  .ban-dropdown {
    position:absolute; top:100%; right:0; margin-top:4px;
    background:#1a1a2e; border:1px solid #2a2a3e; border-radius:8px;
    min-width:140px; z-index:100; display:none; overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.5);
  }
  .ban-dropdown.open { display:block; }
  .ban-dropdown button {
    display:block; width:100%; text-align:left; padding:8px 12px;
    background:none; border:none; color:#e0e0f0; font-size:12px; cursor:pointer;
  }
  .ban-dropdown button:hover { background:rgba(255,100,100,.1); color:#ff6b6b; }

  .search-bar { padding:16px 20px; border-bottom:1px solid #1e1e2e; }
  .search-bar input { width:100%; max-width:300px; padding:8px 12px; background:#1a1a2e; border:1px solid #2a2a3e; border-radius:8px; color:#e0e0f0; font-size:13px; outline:none; }
  .search-bar input:focus { border-color:#00c9a7; }

  .tab-bar { display:flex; gap:4px; padding:16px 20px 0; border-bottom:1px solid #1e1e2e; }
  .tab { padding:8px 16px; border:none; background:none; color:#8888aa; cursor:pointer; font-size:13px; font-weight:600; border-bottom:2px solid transparent; margin-bottom:-1px; }
  .tab.active { color:#00c9a7; border-bottom-color:#00c9a7; }

  .usage-bar-wrap { background:#1a1a2e; border-radius:4px; height:6px; width:80px; display:inline-block; vertical-align:middle; }
  .usage-bar { height:100%; border-radius:4px; background:#00c9a7; }

  .toast { position:fixed; bottom:24px; right:24px; background:#1e1e2e; border:1px solid #2a2a3e; border-radius:10px; padding:12px 18px; font-size:13px; z-index:9999; opacity:0; transition:opacity .3s; pointer-events:none; }
  .toast.show { opacity:1; }

  .empty { text-align:center; padding:40px; color:#5a5a7a; font-size:13px; }

  @media(max-width:600px) {
    .page { padding:16px; }
    nav { padding:0 16px; }
    .stats-grid { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div style="font-size:32px;margin-bottom:12px">🌍</div>
    <h1>GeoAnalyzerX Admin</h1>
    <p>Enter your admin key to continue</p>
    <input type="password" id="admin-key-input" placeholder="Admin key" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
    <div id="login-error" style="color:#ff6b6b;font-size:12px;margin-top:10px;display:none;">Invalid admin key</div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <nav>
    <h1>GeoAnalyzerX Admin</h1>
    <div class="nav-right">
      <span id="nav-status">●</span>
      <span id="nav-time"></span>
      <button class="btn btn-sm" onclick="refreshAll()" style="background:#1a1a2e;border:1px solid #2a2a3e;color:#e0e0f0;">↻ Refresh</button>
    </div>
  </nav>

  <div class="page">
    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      <div class="stat-card"><div class="num" id="s-total">—</div><div class="label">Total Users</div></div>
      <div class="stat-card"><div class="num" id="s-pro">—</div><div class="label">Pro Users</div></div>
      <div class="stat-card"><div class="num" id="s-free">—</div><div class="label">Free Users</div></div>
      <div class="stat-card"><div class="num" id="s-scenes">—</div><div class="label">Community Scenes</div></div>
      <div class="stat-card"><div class="num" id="s-new">—</div><div class="label">New Today</div></div>
    </div>

    <!-- Today's Usage -->
    <div class="card">
      <div class="card-header"><h2>📊 Today's Usage</h2><span id="usage-date"></span></div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>User</th><th>Tier</th><th>F7 Captures</th><th>Guides</th><th>Analyses</th></tr></thead>
          <tbody id="usage-tbody"><tr><td colspan="5" class="empty">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- Users -->
    <div class="card">
      <div class="card-header"><h2>👥 All Users</h2><span id="user-count"></span></div>
      <div class="search-bar">
        <input type="text" id="user-search" placeholder="Search by username or email..." oninput="filterUsers()">
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead><tr><th>Username</th><th>Email</th><th>Tier</th><th>Signed Up</th><th>Last Login</th><th>Actions</th></tr></thead>
          <tbody id="users-tbody"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://geoanalyzerx.onrender.com';
let adminKey = '';
let allUsers = [];

function doLogin() {
  const key = document.getElementById('admin-key-input').value.trim();
  if (!key) return;
  adminKey = key;
  fetch(`${API}/admin/stats?admin_key=${encodeURIComponent(key)}`)
    .then(r => r.json())
    .then(d => {
      if (d.error) {
        document.getElementById('login-error').style.display = 'block';
        adminKey = '';
        return;
      }
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      loadStats(d);
      loadUsers();
      startClock();
    })
    .catch(() => { document.getElementById('login-error').style.display = 'block'; adminKey = ''; });
}

function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('nav-time').textContent = now.toLocaleTimeString();
    document.getElementById('usage-date').textContent = now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
  }
  tick();
  setInterval(tick, 1000);
  document.getElementById('nav-status').style.color = '#00c9a7';
}

function loadStats(d) {
  document.getElementById('s-total').textContent  = d.total_users;
  document.getElementById('s-pro').textContent    = d.pro_users;
  document.getElementById('s-free').textContent   = d.free_users;
  document.getElementById('s-scenes').textContent = d.scenes;
  document.getElementById('s-new').textContent    = d.new_today;

  const tbody = document.getElementById('usage-tbody');
  if (!d.usage_today?.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">No activity today yet</td></tr>';
    return;
  }
  tbody.innerHTML = d.usage_today.map(u => `
    <tr>
      <td><strong>${u.username}</strong></td>
      <td><span class="badge badge-${u.tier}">${u.tier}</span></td>
      <td>
        <span style="margin-right:8px">${u.f7||0}/10</span>
        <span class="usage-bar-wrap"><span class="usage-bar" style="width:${Math.min(100,(u.f7||0)*10)}%;background:${(u.f7||0)>=10?'#ff6b6b':'#00c9a7'}"></span></span>
      </td>
      <td>
        <span style="margin-right:8px">${u.guides||0}/10</span>
        <span class="usage-bar-wrap"><span class="usage-bar" style="width:${Math.min(100,(u.guides||0)*10)}%;background:${(u.guides||0)>=10?'#ff6b6b':'#00c9a7'}"></span></span>
      </td>
      <td>${u.analyses||0}</td>
    </tr>`).join('');
}

function loadUsers() {
  fetch(`${API}/admin/users?admin_key=${encodeURIComponent(adminKey)}`)
    .then(r => r.json())
    .then(d => {
      allUsers = d.users || [];
      document.getElementById('user-count').textContent = `${allUsers.length} users`;
      renderUsers(allUsers);
    });
}

function renderUsers(users) {
  const tbody = document.getElementById('users-tbody');
  if (!users.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No users found</td></tr>'; return; }
  tbody.innerHTML = users.map(u => {
    const isBanned = u.banned_until && new Date(u.banned_until) > new Date();
    const isPermaBanned = isBanned && (new Date(u.banned_until) - new Date()) > 1000*60*60*24*365;
    return `
    <tr>
      <td><strong>${u.username}</strong>${u.disabled ? `<br><span class="badge badge-banned" style="margin-top:4px;">⏸ Disabled</span>` : ''}${isBanned ? `<br><span class="badge badge-banned" style="margin-top:4px;">${isPermaBanned ? '🚫 Permanent' : '🚫 Until ' + formatDate(u.banned_until)}</span>` : ''}</td>
      <td style="color:#8888aa;font-size:12px">${u.email}</td>
      <td><span class="badge badge-${u.tier}">${u.tier}</span></td>
      <td style="color:#8888aa;font-size:12px">${formatDate(u.created_at)}</td>
      <td style="color:#8888aa;font-size:12px">${formatDate(u.last_login)}</td>
      <td>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          ${u.tier === 'free'
            ? `<button class="btn btn-sm btn-purple" onclick="setTier(${u.id},'pro','${u.username}')">↑ Pro</button>`
            : `<button class="btn btn-sm btn-danger" onclick="setTier(${u.id},'free','${u.username}')">↓ Free</button>`
          }
          <button class="btn btn-sm" style="background:#1a1a2e;border:1px solid #2a2a3e;color:#8888aa;" onclick="resetUsage(${u.id},'${u.username}')">Reset</button>
          <button class="btn btn-sm" style="background:${u.disabled ? 'rgba(0,201,167,.15)' : '#1a1a2e'};border:1px solid ${u.disabled ? 'rgba(0,201,167,.3)' : '#2a2a3e'};color:${u.disabled ? '#00c9a7' : '#8888aa'};" onclick="toggleDisabled(${u.id},'${u.username}',${!u.disabled})">${u.disabled ? '▶ Enable' : '⏸ Disable'}</button>
          <div class="ban-menu">
            <button class="btn btn-sm" style="background:${isBanned ? 'rgba(255,100,100,.15)' : '#1a1a2e'};border:1px solid ${isBanned ? 'rgba(255,100,100,.3)' : '#2a2a3e'};color:${isBanned ? '#ff6b6b' : '#8888aa'};" onclick="toggleBanMenu(event,${u.id})">${isBanned ? '🚫 Banned' : '🚫 Ban'}</button>
            <div class="ban-dropdown" id="ban-menu-${u.id}">
              ${isBanned ? `<button onclick="banUser(${u.id},'${u.username}','unban')">✓ Unban</button>` : `
              <button onclick="banUser(${u.id},'${u.username}','1d')">1 Day</button>
              <button onclick="banUser(${u.id},'${u.username}','3d')">3 Days</button>
              <button onclick="banUser(${u.id},'${u.username}','1w')">1 Week</button>
              <button onclick="banUser(${u.id},'${u.username}','1m')">1 Month</button>
              <button onclick="banUser(${u.id},'${u.username}','permanent')">Permanent</button>
              `}
            </div>
          </div>
          <button class="btn btn-sm btn-danger" onclick="deleteUser(${u.id},'${u.username}')">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function toggleDisabled(userId, username, disabled) {
  if (!confirm(`${disabled ? 'Disable' : 'Enable'} ${username}'s account?`)) return;
  fetch(`${API}/admin/toggle_disabled`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({admin_key: adminKey, user_id: userId, disabled})
  }).then(r => r.json()).then(d => {
    toast(d.success ? `✓ ${username} ${disabled ? 'disabled' : 'enabled'}` : 'Error: ' + (d.error || 'failed'), !d.success);
    if (d.success) loadUsers();
  });
}

function toggleBanMenu(e, userId) {
  e.stopPropagation();
  document.querySelectorAll('.ban-dropdown').forEach(d => { if (d.id !== `ban-menu-${userId}`) d.classList.remove('open'); });
  document.getElementById(`ban-menu-${userId}`).classList.toggle('open');
}
document.addEventListener('click', () => document.querySelectorAll('.ban-dropdown').forEach(d => d.classList.remove('open')));

function banUser(userId, username, duration) {
  const labels = {'1d':'1 day','3d':'3 days','1w':'1 week','1m':'1 month','permanent':'PERMANENTLY','unban':'unban'};
  if (!confirm(`${duration === 'unban' ? 'Unban' : 'Ban'} ${username} ${duration === 'unban' ? '' : 'for ' + labels[duration]}?`)) return;
  fetch(`${API}/admin/ban_user`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({admin_key: adminKey, user_id: userId, duration})
  }).then(r => r.json()).then(d => {
    toast(d.success ? `✓ ${username} ${duration === 'unban' ? 'unbanned' : 'banned'}` : 'Error: ' + (d.error || 'failed'), !d.success);
    if (d.success) loadUsers();
  });
}

function filterUsers() {
  const q = document.getElementById('user-search').value.toLowerCase();
  renderUsers(allUsers.filter(u => u.username.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
}

function setTier(userId, tier, username) {
  if (!confirm(`Set ${username} to ${tier}?`)) return;
  fetch(`${API}/admin/set_tier`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({admin_key: adminKey, user_id: userId, tier})
  }).then(r => r.json()).then(d => {
    if (d.success || d.ok) {
      toast(`✓ ${username} is now ${tier}`);
      const u = allUsers.find(u => u.id === userId);
      if (u) u.tier = tier;
      renderUsers(allUsers.filter(u => {
        const q = document.getElementById('user-search').value.toLowerCase();
        return !q || u.username.toLowerCase().includes(q) || u.email.toLowerCase().includes(q);
      }));
    } else { toast('Error: ' + (d.error || 'failed'), true); }
  });
}

function deleteUser(userId, username) {
  if (!confirm(`Permanently delete ${username}? This cannot be undone.`)) return;
  if (!confirm(`Are you absolutely sure? This will erase their account, sessions, and usage history.`)) return;
  fetch(`${API}/admin/delete_user`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({admin_key: adminKey, user_id: userId})
  }).then(r => r.json()).then(d => {
    toast(d.success ? `✓ Deleted ${username}` : 'Error: ' + (d.error || 'failed'), !d.success);
    if (d.success) { allUsers = allUsers.filter(u => u.id !== userId); refreshAll(); }
  });
}

function resetUsage(userId, username) {
  if (!confirm(`Reset today's usage for ${username}?`)) return;
  fetch(`${API}/admin/reset_usage`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({admin_key: adminKey, user_id: userId})
  }).then(r => r.json()).then(d => {
    toast(d.success ? `✓ Reset ${username}'s daily usage` : 'Error: ' + (d.error || 'failed'), !d.success);
    refreshAll();
  });
}

function refreshAll() {
  fetch(`${API}/admin/stats?admin_key=${encodeURIComponent(adminKey)}`)
    .then(r => r.json()).then(d => { if (!d.error) loadStats(d); });
  loadUsers();
}

function formatDate(str) {
  if (!str || str === 'None') return '—';
  try { return new Date(str).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}); }
  catch { return str; }
}

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isError ? '#ff6b6b' : '#00c9a7';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
